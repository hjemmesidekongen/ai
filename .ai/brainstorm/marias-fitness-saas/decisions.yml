topic: marias-fitness-saas
decided: 2026-03-11
decisions:

  - id: D1
    title: Core value proposition
    decision: >
      "Remove the thinking from working out." Two problems solved:
      (1) decision paralysis — what to do today, (2) working memory — what
      did I lift last time. Not a full fitness platform. Tight and focused.
    rationale: ADHD users are blocked by overwhelm and memory, not lack of exercise knowledge.

  - id: D2
    title: Onboarding approach
    decision: >
      Minimal onboarding: 5-6 tap-based questions. Equipment access (gym/home/minimal),
      training days per week, injuries/limitations, experience level, goal direction
      (strength/general fitness/muscle building), preferred session length.
      Progressive disclosure handles the rest — app learns from usage over time.
    rationale: Long questionnaires are high friction for ADHD users. Collect minimum viable info to generate a program, refine through usage.

  - id: D3
    title: Product scope — daily workout plans
    decision: >
      Core loop: open app → today's workout is shown → tap through exercises →
      log sets/reps/weight → done. No navigation, no decisions required from the user.
    rationale: The daily experience IS the product. Reducing cognitive load at every touchpoint.

  - id: D4
    title: Progression engine — simple rules, no AI at launch
    decision: >
      V1 uses simple rule-based progression, not AI. Show last session's numbers.
      Suggest weight increase only when user hits top of prescribed rep range
      consistently (e.g., hit 12 reps three sessions in a row on an 8-12 range → bump weight).
      Otherwise just display history and let user decide.
    rationale: Solves the memory problem without AI complexity/cost. Progressive overload logic is well-understood and doesn't need ML. Can add smarter suggestions later.

  - id: D5
    title: Program generation — template-based, not AI-generated
    decision: >
      Programs are predefined templates assigned based on onboarding answers.
      Templates cover common splits (push/pull/legs, upper/lower, full body)
      matched to experience level, available equipment, and days per week.
      No AI generation at launch.
    rationale: Proven programming exists. Templates are predictable, testable, and free to run. AI generation adds cost, unpredictability, and liability. Can layer it on later as a premium feature.

  - id: D6
    title: ADHD-specific UX principles
    decision: >
      Baked into app behavior, not just marketing. Principles:
      (1) Zero-decision workout start — today's plan is front and center.
      (2) Low-shame missed days — no streaks, no guilt messaging, just "here's your next workout."
      (3) Short feedback loops — immediate visual confirmation on logged sets.
      (4) Novelty through exercise variation within the program template over weeks.
    rationale: ADHD differentiation must be in the product behavior, not just the questionnaire. Shame and overwhelm are the enemies.
