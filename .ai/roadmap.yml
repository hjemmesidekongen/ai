  - id: RL-133
    title: "Iterative build planning (research → plan → build → learn loops)"
    description: >
      Current plan engine creates all waves upfront. For large features (plugins,
      multi-skill builds), this front-loads decisions before learning anything.
      Need a planning mode that: (1) plans ONE chunk at a time, (2) requires
      research before each planning step, (3) captures learnings after each build,
      (4) feeds learnings into the next planning step. The loop: orient → research
      → plan one chunk → build → verify → learn → repeat. Learnings accumulate in
      a file that each iteration reads first. This replaces rigid wave-based planning
      for large features where the right sequence can only be discovered by doing.
      Works with autopilot for overnight autonomous builds. Key insight: you can't
      plan wave 6 before wave 1 teaches you something.
    category: core
    plugin: kronen
    priority: done
    completed: "2026-03-11"
    added: "2026-03-10"
    tags: [planning, iteration, autopilot, learning-loop, architecture]

