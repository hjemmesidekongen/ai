  - id: RL-079
    title: "Compact gate hooks — boundary enforcement"
    description: >
      Two-hook system enforcing compaction at unit boundaries.
      PostToolUse on unit-completion artifacts (SKILL.md, commands/*.md, agents/*.md,
      decisions.yml, state.yml wave-done, findings.md) writes .ai/compact-needed flag.
      PreToolUse on next unit's primary write checks flag, exits 2 with:
      "Compact required before starting next unit. Run /compact, then retry."
    category: core
    plugin: kronen
    priority: done
    completed: "2026-03-09"
    source: "brainstorm/smart-context-compaction"
    added: "2026-03-09"
    tags: [compaction, hooks, context, quality]

  - id: RL-080
    title: "PreCompact snapshot writer"
    description: >
      PreCompact hook writes a lean point-in-time snapshot to .ai/compact-snapshot.yml
      before any compaction event (manual or auto). Captures: active plan/wave/task,
      active project, recently modified file paths (from trace log), error count.
      Max ~300-500 tokens. Disk state only — in-flight reasoning not captured.
      Self-deletes after being consumed by SessionStart compact handler (RL-081).
    category: core
    plugin: kronen
    priority: done
    completed: "2026-03-09"
    source: "brainstorm/smart-context-compaction"
    added: "2026-03-09"
    tags: [compaction, hooks, recovery, context]

  - id: RL-081
    title: "SessionStart compact handler — snapshot restore"
    description: >
      Upgraded session-recovery.sh to handle the compact case.
      Reads .ai/compact-snapshot.yml, outputs recovery context,
      clears .ai/compact-needed flag, deletes snapshot after consumption.
      Completes the compact loop: PreCompact saves → SessionStart restores.
    category: core
    plugin: kronen
    priority: done
    completed: "2026-03-09"
    source: "brainstorm/smart-context-compaction"
    added: "2026-03-09"
    tags: [compaction, session-recovery, hooks, context]

  - id: RL-082
    title: "Smart session injection — three-layer context architecture"
    description: >
      Shared assembler (assemble-context.sh) builds enriched snapshot with three layers:
      Layer 1 (workspace): git branch, dirty files, identity. Layer 2 (project): name,
      status, current module, completed modules. Layer 3 (working state): active plan/wave,
      modified files, error count. Written by PreCompact, Stop, and SessionStart hooks.
      Persists at .ai/context/snapshot.yml. CLAUDE.md pointer survives compaction.
      Stale snapshots (>48h) auto-deleted. Output capped at 50 lines.
    category: core
    plugin: kronen
    priority: done
    completed: "2026-03-09"
    source: "brainstorm/smart-context-compaction"
    added: "2026-03-09"
    tags: [session-recovery, context, injection, memory]

  - id: RL-083
    title: "Project memory system — temporal decay, two-tier, dedup"
    description: >
      Memory system for per-project knowledge with intelligent staleness handling.
      Inspired by memory-mcp (yuvalsuede): https://dev.to/suede/the-architecture-of-persistent-memory-for-claude-code-17d
      Tier 1: auto-generated CLAUDE.md section, fixed line budgets per category
      (architecture: 25, decisions: 25, patterns: 25, gotchas: 20, progress: 30, context: 15).
      Tier 2: persistent JSON store (.memory/state.json), unlimited, searchable on demand.
      Temporal decay: architecture/decisions/patterns/gotchas = permanent; progress = 7-day half-life;
      context = 30-day half-life. Below 0.3 confidence: hidden from Tier 1, still searchable.
      Ranking: confidence * accessCount. Dedup: Jaccard >60% token overlap → supersede.
      Haiku consolidation every 10 extractions or >80 memories. Cost ~$0.001/extraction.
      Scoping: every entry tagged workspace or project-specific — never mix in injection.
    category: core
    plugin: kronen
    priority: later
    source: "brainstorm/smart-context-compaction"
    added: "2026-03-09"
    tags: [memory, decay, two-tier, dedup, context]
    _source:
      inspiration: "https://dev.to/suede/the-architecture-of-persistent-memory-for-claude-code-17d"
      also_see: [mem0, claude-mem, contextstream]

