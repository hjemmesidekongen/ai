<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1A1A1A" stroke-width="1"/>

  <!-- Amber accent bar -->
  <rect x="80" y="240" width="4" height="120" rx="2" fill="#F59E0B"/>

  <!-- Brand name -->
  <text
    x="108"
    y="295"
    font-family="ui-monospace, 'Cascadia Code', 'SF Mono', 'Fira Mono', monospace"
    font-size="72"
    font-weight="600"
    fill="#FAFAFA"
    letter-spacing="-2"
  >hjemmesidekongen</text>

  <!-- /ai suffix — secondary, amber -->
  <text
    x="108"
    y="372"
    font-family="ui-monospace, 'Cascadia Code', 'SF Mono', 'Fira Mono', monospace"
    font-size="72"
    font-weight="400"
    fill="#F59E0B"
    letter-spacing="-2"
    opacity="0.9"
  >/ai</text>

  <!-- Tagline -->
  <text
    x="112"
    y="430"
    font-family="ui-monospace, 'Cascadia Code', 'SF Mono', 'Fira Mono', monospace"
    font-size="24"
    font-weight="400"
    fill="#6B7280"
    letter-spacing="0.5"
  >developer tools &amp; engineering notes</text>

  <!-- Bottom rule -->
  <rect x="80" y="570" width="240" height="1" fill="#1F1F1F"/>
</svg>
