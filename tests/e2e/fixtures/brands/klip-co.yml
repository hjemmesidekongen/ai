# Klip & Co — Local hairdresser (hyperlocal)
# Minimal brand brief for eval testing (D-003: intentionally thin)
name: "Klip & Co"
industry: Hair salon / Beauty
scope: Hyperlocal — single salon in Roskilde, Denmark
description: >
  Neighborhood hair salon run by two stylists. Walk-ins welcome,
  regulars get a text when their favorite stylist has an opening.
samples:
  - "Ny uge, ny stil? Book din tid hos os — eller bare kig forbi."
  - "Vi kender dit hår bedre end du gør. Og vi har kaffe klar."
direction: Warm, casual, Danish-language-first. Instagram and word-of-mouth driven.
