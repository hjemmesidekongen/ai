# ============================================================
# Error Annotation Format — kronen tracing
# ============================================================
# Used by both light and full tracing modes.
# Claude writes these entries in the moment, not after the fact.
# The trace scripts provide the format; Claude provides the content.
#
# Light mode: error-annotated line appended to trace-light.log
# Full mode:  structured error entry in session YAML
# ============================================================

# ----------------------------------------------------------
# LIGHT TRACE FORMAT (extends the standard pipe-delimited line)
# ----------------------------------------------------------
# Standard: timestamp|tool_name|status|context
# Error:    timestamp|tool_name|error|context|severity|error_summary
#
# The two extra pipe fields (severity, error_summary) distinguish
# error-annotated lines from standard lines. Parsers detect error
# annotations by: status == "error" AND field_count >= 6.

light_trace:
  standard_fields: "timestamp|tool_name|status|context"
  error_fields: "timestamp|tool_name|error|context|severity|error_summary"
  field_count:
    standard: 4
    error_annotated: 6
  detection_rule: "status == 'error' AND field_count >= 6"

  examples:
    standard_error: "2026-03-08T14:22:01Z|Bash|error|npm test|critical|Tests fail — 3 assertions broken in auth module"
    warning: "2026-03-08T14:22:01Z|Edit|error|src/api.ts|warning|Deprecated fetch wrapper used — works but will break in v3"
    info: "2026-03-08T14:22:01Z|Read|error|config.json|info|Unexpected format (JSONC not JSON) — handled by stripping comments"

# ----------------------------------------------------------
# FULL TRACE FORMAT (structured YAML entry)
# ----------------------------------------------------------
# Added to the session file at .ai/traces/sessions/trace-full-{date}.yml
# under an `errors:` array.

full_trace:
  required_fields:
    timestamp:
      type: "string"
      format: "ISO 8601 UTC (e.g. 2026-03-08T14:22:01Z)"
      description: "When the error was observed"

    severity:
      type: "enum"
      values: ["critical", "warning", "info"]
      description: "How much this error matters"

    error_summary:
      type: "string"
      max_length: 120
      description: "One-line description of what went wrong"

    context:
      type: "string"
      description: "What was being done when the error occurred (tool, step, goal)"

  optional_fields:
    reproduction:
      type: "string"
      description: "Steps to reproduce the error"

    expected:
      type: "string"
      description: "What was expected to happen"

    actual:
      type: "string"
      description: "What actually happened"

    suggested_fix:
      type: "string"
      description: "Claude's immediate assessment of how to fix it"

    related_files:
      type: "list"
      items: "string"
      description: "Absolute paths of files involved"

    trace_ref:
      type: "string"
      description: "Reference to the trace entry — light log line number or full trace entry ID"

  example:
    timestamp: "2026-03-08T14:22:01Z"
    severity: "critical"
    error_summary: "Tests fail — 3 assertions broken in auth module"
    context: "Running npm test after refactoring auth middleware"
    reproduction: "Run `npm test -- --grep auth` from project root"
    expected: "All 12 auth tests pass"
    actual: "9 pass, 3 fail (token validation, session expiry, refresh flow)"
    suggested_fix: "Token validation changed signature in refactor — update test mocks to match new arg order"
    related_files:
      - "/Users/mvn/project/src/auth/middleware.ts"
      - "/Users/mvn/project/tests/auth/middleware.test.ts"
    trace_ref: "line 47 of trace-light.log"

# ----------------------------------------------------------
# SEVERITY GUIDELINES
# ----------------------------------------------------------

severity_guidelines:
  critical:
    description: "Blocks task completion. Must be resolved before marking done."
    action: "Stop and fix before proceeding."
    examples:
      - "Test failure that indicates broken functionality"
      - "File write that overwrote important data"
      - "Hook that blocks Claude from proceeding"
      - "Build failure that prevents deployment"
      - "Data loss or corruption"

  warning:
    description: "Does not block but should be reviewed. May indicate future issues."
    action: "Note in trace, continue work, review before marking task complete."
    examples:
      - "Deprecated API usage"
      - "Performance degradation detected"
      - "Partial success — some items failed"
      - "Workaround applied instead of proper fix"
      - "Non-critical test skipped"

  info:
    description: "Noteworthy observation. No action required."
    action: "Record for context. No follow-up needed."
    examples:
      - "Unexpected file format, handled gracefully"
      - "Alternative approach discovered during debugging"
      - "Dependency version mismatch (non-breaking)"
      - "Edge case encountered but handled"
      - "Configuration auto-corrected"

# ----------------------------------------------------------
# HOOK-ERRORS.LOG FORMAT (hook-level decision trace)
# ----------------------------------------------------------
# Written by PreToolUse hooks when they warn or block.
# File: .ai/traces/hook-errors.log
# Each line is one hook decision event.

hook_errors_log:
  location: ".ai/traces/hook-errors.log"
  format: "timestamp|hook_name|decision|file_path|reason"
  field_count: 5
  decisions:
    block: "Hook returned exit 2 — tool call was prevented"
    warn: "Hook logged advisory warning — tool call proceeded"
  hooks_that_write:
    - "tdd-gate (block: no test found)"
    - "scope-guard (warn: file not in plan scope)"
    - "plan-gate (warn: no active plan)"
  examples:
    block: "2026-03-09T14:31:42Z|tdd-gate|block|src/auth/handler.ts|no test file found for handler.ts"
    warn_scope: "2026-03-09T14:23:01Z|scope-guard|warn|plugins/kronen/skills/foo/SKILL.md|not in declared writes for wave-1 (plan: my-plan)"
    warn_plan: "2026-03-09T14:25:11Z|plan-gate|warn|plugins/kronen/skills/bar/SKILL.md|no active plan found"

# ----------------------------------------------------------
# CONSTRAINTS
# ----------------------------------------------------------

constraints:
  - "Write annotations in the moment — do not rationalize or reconstruct after the fact"
  - "error_summary must be a single line, max 120 characters"
  - "severity must be exactly one of: critical, warning, info"
  - "Light trace error lines must be parseable with the same pipe delimiter as standard lines"
  - "No pipe characters (|) in error_summary — use dashes or commas instead"
  - "Annotations are shared knowledge — write clearly enough for another agent to understand without context"
  - "Full trace entries go under the errors: array in the session YAML"
  - "Post-mortem learning fields are optional — add when an error reveals a systemic pattern"

# ----------------------------------------------------------
# POST-MORTEM LEARNING (extends full trace error entries)
# ----------------------------------------------------------
# When a resolved error reveals a recurring pattern or systemic
# issue, add learning fields to the full trace error entry.
# These fields feed the instinct pipeline (instinct-extractor)
# and help harden the system against repeat failures.
#
# Source: error-coordinator pattern (P4, external-reference-findings)

post_mortem_learning:
  description: >
    Optional fields added to full trace error entries after resolution.
    Captures the learning from the error, not just the error itself.

  fields:
    pattern_extracted:
      type: "string"
      description: >
        The systemic pattern this error revealed. Not the specific error,
        but the class of problem. E.g. "Hook scripts that read state.yml
        without checking file existence first" — not "scope-guard.sh crashed".
      examples:
        - "Skills with depends_on arrays referencing deleted skills"
        - "Shell hooks that assume jq is installed without fallback"
        - "YAML frontmatter iteration field stored as string instead of integer"

    runbook_entry:
      type: "string"
      description: >
        A concrete, actionable step to diagnose or fix this class of error
        in the future. Written as an imperative instruction.
      examples:
        - "Check all depends_on arrays after renaming or deleting a skill — grep for the old name across all SKILL.md files"
        - "When hook exits non-zero unexpectedly, check stderr first — hook-errors.log may not capture the real cause"
        - "After porting a skill, run skill-auditor before component-reviewer — auditor catches frontmatter issues that reviewer misses"

    hardening_recommendation:
      type: "string"
      description: >
        A structural change that would prevent this class of error entirely.
        May reference hooks, validation agents, schema changes, or process changes.
      examples:
        - "Add depends_on validation to component-reviewer — flag references to non-existent skills"
        - "Add jq availability check to all hook scripts that parse JSON"
        - "Add iteration type check to skill-auditor — must be integer, not string"

    feeds_instinct:
      type: "boolean"
      description: >
        Whether this learning should be forwarded to instinct-extractor
        as an observation. Set true when the pattern is recurring (seen 2+ times)
        or when the hardening recommendation is not yet implemented.
      default: false

  example:
    timestamp: "2026-03-09T14:22:01Z"
    severity: "critical"
    error_summary: "scope-guard crashes when state.yml missing — unhandled file read"
    context: "Running plan-execute with no active plan"
    suggested_fix: "Add file existence check before reading state.yml in scope-guard.sh"
    pattern_extracted: "Hook scripts that read state files without checking existence first"
    runbook_entry: "When a hook crashes silently, check if it reads files that may not exist — add -f guards"
    hardening_recommendation: "Add file existence pre-check to all PreToolUse hooks that read state.yml or plan files"
    feeds_instinct: true
