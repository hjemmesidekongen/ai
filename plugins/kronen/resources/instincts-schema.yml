# Instincts Schema
# Storage format for the continuous learning pipeline (F2)

# observations.jsonl — one JSON object per line, written by observation-recorder.sh
observation:
  timestamp: "ISO8601"          # when the observation was recorded
  tool: "string"                # tool name (e.g., Edit, Bash, Grep)
  outcome: "success|error"      # whether the tool call succeeded
  context_type: "string"        # inferred task type: debug|plan|refactor|write|search|review
  sequence_key: "string"        # hash of recent tool sequence (for pattern detection)
  error_summary: "string|null"  # first 80 chars of error if outcome=error

# instincts.yml — structured instinct entries, curated by instinct-extractor
instinct:
  id: "string"                  # slug: domain-short-description
  domain: "string"              # debug|plan|git|skill|hook|agent|context|general
  pattern_description: "string" # one sentence: what pattern this captures
  confidence: 0.0               # 0.0–1.0; decays 0.1 per contradiction
  evidence_count: 0             # number of supporting observations
  contradiction_count: 0        # number of contradicting observations
  first_seen: "ISO8601"
  last_seen: "ISO8601"
  status: "active"              # active | decayed (confidence < 0.2) | evolved
  evolved_to: "string|null"     # e.g., "MEMORY.md:line 42" or "skills/root-cause-debugging"

# Evolution thresholds
evolution:
  min_confidence: 0.75          # instinct must be at or above this to qualify
  min_evidence_count: 3         # instinct must have at least this many supporting observations
  decay_per_contradiction: 0.1  # subtract from confidence for each contradiction
  decay_threshold: 0.2          # below this → status: decayed

# File locations
storage:
  observations: ".ai/instincts/observations.jsonl"   # gitignored (high volume, transient)
  instincts: ".ai/instincts/instincts.yml"            # tracked (curated, stable)
  schema: "plugins/kronen/resources/instincts-schema.yml"
