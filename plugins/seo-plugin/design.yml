# ============================================================
# Plugin Design — SEO Plugin
# ============================================================
# Generated by: plugin-design-interview skill
# Date: 2026-03-01
# Status: awaiting_review
#
# This file is consumed by:
#   - plugin-spec-generator (produces implementation plan + addendum)
#   - plugin-execution-guide-generator (produces build guide)
#   - plugin-scaffolder (creates directories + plugin.json)
# ============================================================

name: "seo-plugin"
description: "Generates a comprehensive SEO strategy with keyword research, on-page optimization, technical SEO audits, competitive analysis, and content recommendations tailored to a project's goals and target audience."

persona:
  role: "Developer or technical marketer"
  technical_level: "developer"
  cares_about: "search rankings, organic traffic, and technical site performance"

needs_brand: true

brand_sections_needed:
  project-interview:
    - identity
    - audience
  keyword-research:
    - voice
    - content
  content-strategy:
    - voice
    - audience
    - content
  link-building:
    - identity

commands:
  - name: "seo:strategy"
    purpose: "Generates a full SEO strategy through an interactive process with keyword research, competitor analysis, and actionable recommendations"
    interactive: true
    uses_planner: true
  - name: "seo:audit"
    purpose: "Audits an existing website or page against SEO best practices and reports issues with fix recommendations"
    interactive: false
    uses_planner: false
  - name: "seo:content-brief"
    purpose: "Generates a detailed content brief for a specific keyword or topic, including outline, target word count, and SEO requirements"
    interactive: true
    uses_planner: false
  - name: "seo:export"
    purpose: "Exports the SEO strategy as a formatted report in Markdown or DOCX format"
    interactive: false
    uses_planner: false

skills:
  - name: "project-interview"
    purpose: "Gathers project context including website URL, industry, goals, target audience, and current SEO status through an interactive interview"
    interactive: true
    depends_on: []
    reads:
      - "brand-reference.yml (identity, audience sections via brand-context-loader)"
    writes:
      - "seo-strategy.yml (meta, project_context sections)"
    checkpoint:
      type: "data_validation"
      checks:
        - "project_context section has website_url, industry, and goals fields populated"
        - "At least 2 target audience segments defined"
        - "Current SEO status assessment has at least 3 data points"

  - name: "keyword-research"
    purpose: "Conducts keyword research by identifying primary, secondary, and long-tail keywords with search volume estimates, difficulty scores, and search intent classification"
    interactive: true
    depends_on:
      - "project-interview"
    reads:
      - "seo-strategy.yml (project_context section)"
      - "brand-reference.yml (voice, content sections via brand-context-loader)"
    writes:
      - "seo-strategy.yml (keywords section)"
    checkpoint:
      type: "data_validation"
      checks:
        - "At least 5 primary keywords defined with search_volume and difficulty fields"
        - "At least 10 secondary keywords defined"
        - "At least 15 long-tail keywords defined"
        - "Every keyword has search_intent classified as informational, navigational, commercial, or transactional"

  - name: "competitor-analysis"
    purpose: "Analyzes top competitors for target keywords, identifying their strengths, weaknesses, content gaps, and backlink profiles"
    interactive: false
    depends_on:
      - "project-interview"
    reads:
      - "seo-strategy.yml (project_context section)"
    writes:
      - "seo-strategy.yml (competitors section)"
    checkpoint:
      type: "data_validation"
      checks:
        - "At least 3 competitors analyzed"
        - "Each competitor has domain_authority, top_keywords, content_strengths, and content_gaps fields"
        - "Content gap analysis identifies at least 5 opportunity keywords"

  - name: "on-page-optimization"
    purpose: "Generates on-page SEO rules including title tag patterns, meta description templates, heading structure, internal linking strategy, and schema markup recommendations"
    interactive: false
    depends_on:
      - "project-interview"
      - "keyword-research"
    reads:
      - "seo-strategy.yml (project_context, keywords sections)"
    writes:
      - "seo-strategy.yml (on_page section)"
    checkpoint:
      type: "data_validation"
      checks:
        - "Title tag pattern defined with character count limits"
        - "Meta description template defined with character count limits"
        - "Heading hierarchy rules defined (H1-H4)"
        - "Internal linking strategy has at least 3 rules"
        - "At least 2 schema markup types recommended"

  - name: "technical-seo"
    purpose: "Produces a technical SEO checklist covering site speed, mobile-friendliness, crawlability, indexation, structured data, and Core Web Vitals targets"
    interactive: false
    depends_on:
      - "project-interview"
    reads:
      - "seo-strategy.yml (project_context section)"
    writes:
      - "seo-strategy.yml (technical section)"
    checkpoint:
      type: "data_validation"
      checks:
        - "Core Web Vitals targets defined for LCP, FID, and CLS"
        - "At least 10 technical checklist items defined"
        - "Each checklist item has priority (critical, high, medium, low) and status fields"
        - "Mobile-friendliness requirements specified"

  - name: "content-strategy"
    purpose: "Creates a content plan with topic clusters, content calendar framework, content types, and SEO-optimized content guidelines aligned with brand voice"
    interactive: false
    depends_on:
      - "keyword-research"
      - "competitor-analysis"
    reads:
      - "seo-strategy.yml (keywords, competitors sections)"
      - "brand-reference.yml (voice, audience, content sections via brand-context-loader)"
    writes:
      - "seo-strategy.yml (content_plan section)"
    checkpoint:
      type: "data_validation"
      checks:
        - "At least 3 topic clusters defined, each with a pillar page and at least 3 supporting pages"
        - "Content types specified with recommended word counts"
        - "Content calendar framework covers at least 3 months"
        - "Each content piece has target_keyword, search_intent, and content_type fields"

  - name: "link-building"
    purpose: "Develops a link-building strategy with outreach targets, content promotion tactics, and authority-building recommendations"
    interactive: false
    depends_on:
      - "competitor-analysis"
      - "content-strategy"
    reads:
      - "seo-strategy.yml (competitors, content_plan sections)"
      - "brand-reference.yml (identity section via brand-context-loader)"
    writes:
      - "seo-strategy.yml (link_building section)"
    checkpoint:
      type: "data_validation"
      checks:
        - "At least 3 link-building strategies defined"
        - "Each strategy has description, estimated_effort, and expected_impact fields"
        - "At least 5 outreach target categories identified"
        - "Content promotion plan covers at least 3 channels"

  - name: "compile-and-export"
    purpose: "Compiles all strategy sections into a cohesive SEO strategy document in Markdown format and validates the complete seo-strategy.yml"
    interactive: false
    depends_on:
      - "project-interview"
      - "keyword-research"
      - "competitor-analysis"
      - "on-page-optimization"
      - "technical-seo"
      - "content-strategy"
      - "link-building"
    reads:
      - "seo-strategy.yml (all sections)"
    writes:
      - "seo-strategy.md (complete strategy document)"
      - "seo-strategy.yml (meta.updated_at, meta.version)"
    checkpoint:
      type: "file_validation"
      checks:
        - "seo-strategy.md exists and is at least 2000 words"
        - "Document contains all 7 sections: Executive Summary, Keyword Strategy, Competitor Landscape, On-Page Rules, Technical SEO, Content Plan, Link-Building Strategy"
        - "seo-strategy.yml validates against schema (all required sections present)"
        - "No placeholder text remains in any output file"

output:
  yaml:
    name: "seo-strategy.yml"
    storage_path: ".ai/seo/[project-name]/"
    description: "Complete SEO strategy data including keywords, competitors, on-page rules, technical checklist, content plan, and link-building strategy"
  document:
    format: "md"
    sections:
      - "Executive Summary"
      - "Keyword Strategy"
      - "Competitor Landscape"
      - "On-Page Optimization Rules"
      - "Technical SEO Checklist"
      - "Content Plan"
      - "Link-Building Strategy"
  assets: []

verification_profile:
  after_each_wave:
    - "data_validation"
  final:
    - "data_validation"
    - "schema_validation"
    - "seo_audit"
  qa_frequency: "every_wave"
  qa_focus:
    - "keyword relevance and search intent alignment"
    - "actionability of recommendations"
    - "competitive differentiation"

wave_plan:
  - wave: 1
    parallel: false
    skills:
      - "project-interview"
    verification:
      - "data_validation"
  - wave: 2
    parallel: false
    skills:
      - "keyword-research"
    verification:
      - "data_validation"
  - wave: 3
    parallel: true
    skills:
      - "competitor-analysis"
      - "technical-seo"
    verification:
      - "data_validation"
  - wave: 4
    parallel: false
    skills:
      - "on-page-optimization"
    verification:
      - "data_validation"
  - wave: 5
    parallel: false
    skills:
      - "content-strategy"
    verification:
      - "data_validation"
  - wave: 6
    parallel: false
    skills:
      - "link-building"
    verification:
      - "data_validation"
  - wave: 7
    parallel: false
    skills:
      - "compile-and-export"
    verification:
      - "file_validation"
      - "schema_validation"
      - "seo_audit"

status: "approved"
