# Learnings Schema — claude-core
# Defines the structure of learnings.yml files used by the dynamic planning system.
# Accumulates episodic memory across OODA planning cycles. Each orient phase reads
# active learnings to inform plan adjustments. Produced by orient/act phases,
# consumed by orient phase on subsequent cycles.
#
# Reference: Decision D-003 (learnings as episodic memory),
#            Decision D-009 (orient loads active entries only),
#            Decision D-011 (supersede, don't delete)

learnings:
  # --- Goal ---
  goal: string                     # the fixed goal being pursued (set once, never changes)

  # --- Cycle tracking ---
  cycle: integer                   # current cycle number (incremented each OODA iteration)

  # --- Learning entries ---
  # Each entry captures something learned during a cycle that affects future planning.
  # Entries accumulate over time. Old entries are superseded, never deleted.
  entries:
    - cycle: integer               # which cycle produced this learning
      date: "YYYY-MM-DD"           # when the learning was recorded
      type: observation            # observation — noticed pattern or fact
                                   # constraint — discovered limitation or boundary
                                   # correction — prior learning was wrong or incomplete
                                   # discovery — new insight that opens possibilities
      content: string              # freeform prose describing the learning
      impact: string               # what this means for the plan going forward
      status: active               # active — still relevant, loaded by orient phase
                                   # superseded — replaced by a newer entry
                                   # invalidated — proven wrong, no replacement
      supersedes: string | null    # ID or reference to the entry this replaces
                                   # required when type is "correction"
                                   # null for all other types unless explicitly replacing something

  # --- Open questions ---
  # Unresolved questions that need attention in future cycles.
  # Orient phase reviews these to decide what to investigate next.
  open_questions:
    - string                       # one question per entry, phrased as a question

  # --- Cycle metrics ---
  # Per-cycle stats for tracking iteration quality across cycles.
  # Lightweight A/B comparison: did this cycle improve on the last?
  # Written during Learn phase, read during Reflect phase of the next cycle.
  cycle_metrics:
    - cycle: integer               # which cycle these metrics describe
      tasks_planned: integer       # tasks in this cycle's wave
      tasks_completed: integer     # tasks that passed verification
      classification: string       # CONTINUE | ADJUST | REPLAN | ESCALATE
      learnings_added: integer     # new entries written this cycle
      corrections_made: integer    # how many prior learnings were corrected
      wave_passed: boolean         # did verification pass on first attempt?
      notes: string | null         # optional freeform annotation

  # --- Next orientation ---
  # Freeform guidance written at the end of each cycle for the next orient phase.
  # Captures intent and direction that structured fields can't express.
  next_orientation: string

# --- Example ---
# A realistic learnings.yml after two cycles:
#
# goal: "Migrate auth system from session-based to JWT without downtime"
# cycle: 2
# entries:
#   - cycle: 1
#     date: "2026-03-10"
#     type: observation
#     content: "The session store is shared by three services, not just the auth service. Migration affects billing and notifications too."
#     impact: "Plan must include coordination with billing and notification teams. Single-service migration won't work."
#     status: active
#     supersedes: null
#
#   - cycle: 1
#     date: "2026-03-10"
#     type: constraint
#     content: "Rate limiter depends on session IDs for per-user tracking. JWT tokens don't carry the same shape."
#     impact: "Need a JWT claim or middleware adapter for the rate limiter before cutting over."
#     status: superseded
#     supersedes: null
#
#   - cycle: 2
#     date: "2026-03-11"
#     type: correction
#     content: "Rate limiter actually keys on X-User-ID header, not session ID. Checked the middleware source."
#     impact: "Rate limiter is not a blocker. Remove it from the pre-migration checklist."
#     status: active
#     supersedes: "cycle-1 constraint (rate limiter)"
#
# open_questions:
#   - "Does the billing webhook validator check session cookies or auth headers?"
#   - "What is the token refresh window needed for zero-downtime rotation?"
#
#
# cycle_metrics:
#   - cycle: 1
#     tasks_planned: 3
#     tasks_completed: 3
#     classification: CONTINUE
#     learnings_added: 2
#     corrections_made: 0
#     wave_passed: true
#     notes: null
#   - cycle: 2
#     tasks_planned: 2
#     tasks_completed: 2
#     classification: ADJUST
#     learnings_added: 1
#     corrections_made: 1
#     wave_passed: true
#     notes: "Rate limiter assumption corrected — simplified next wave"
#
# next_orientation: "Focus on the billing service integration. The rate limiter concern is resolved. Check webhook auth mechanism before planning the cutover sequence."

# --- Pruning rules ---
# Supersede, don't delete (D-011). Old learnings preserve the reasoning trail.
# When a learning is corrected or replaced:
#   1. Set the old entry's status to "superseded" or "invalidated"
#   2. Create a new entry with type "correction" and supersedes pointing to the old one
#   3. Never remove entries from the array
#
# This keeps the full epistemic history intact. The orient phase filters
# on status: active, so superseded entries don't add noise to current planning
# but remain available for debugging why the plan evolved the way it did.

# --- Orient phase loading (D-009) ---
# The orient phase ONLY loads entries where status: active.
# Superseded and invalidated entries are skipped during orientation
# but preserved in the file for audit trail and reasoning transparency.
