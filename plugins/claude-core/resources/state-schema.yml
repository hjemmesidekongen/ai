# State Schema — claude-core
# Canonical schema for state.yml files.
# Every multi-step operation stores state at: .ai/plans/{name}/state.yml
# Plugins may add fields but MUST include these core fields.

state:
  # --- Context ---
  command: string          # command that initiated this (e.g. plan:execute)
  project: string          # project or plan name
  started_at: iso8601
  updated_at: iso8601
  status: pending | in_progress | completed | verified | failed

  # --- Phase tracking ---
  current_phase: string    # name of currently executing phase/wave
  current_phase_number: integer
  total_phases: integer

  phases:
    - name: string
      number: integer
      status: pending | in_progress | completed | failed
      started_at: iso8601   # optional
      completed_at: iso8601 # optional
      checkpoint:           # optional — verification result
        type: string        # data_validation, ab_benchmark, etc.
        passed: boolean
        details: string
      artifacts: [string]   # files created or modified
      step_artifacts: [string] # intermediate output files written during this phase
                                # convention: .ai/plans/<name>/artifacts/<wave>-<task>-output.md
                                # downstream phases read these before executing

  # --- Error tracking ---
  # Survives /compact and session restarts.
  # Rules:
  #   1. Log ALL errors immediately
  #   2. Check errors before attempting any approach (avoid repeats)
  #   3. Never repeat a failed approach — mutate strategy
  #   4. When fixed, set result: resolved but keep the entry
  errors:
    - timestamp: iso8601
      skill: string          # which phase encountered the error
      error: string          # what went wrong
      attempted_fix: string  # what was tried
      result: resolved | partial | unresolved
      next_approach: string  # what to try next (required if unresolved)

  # --- Recovery ---
  recovery_notes: string    # human-readable status for session resume
