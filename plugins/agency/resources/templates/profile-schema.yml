schema: "profile"
version: "1.0.0"

fields:
  name:
    type: "string"
    required: true
    description: "Unique profile identifier"

  description:
    type: "string"
    required: true
    description: "Human-readable purpose of this profile"

  stack_defaults:
    type: "object|null"
    required: true
    description: "Technology stack defaults loaded at init. Null means no defaults — full negotiation."
    properties:
      framework:
        type: "string"
        examples: ["next.js", "remix", "astro"]
      css:
        type: "string"
        examples: ["tailwind", "vanilla-extract", "css-modules"]
      component_library:
        type: "string"
        examples: ["untitled-ui", "shadcn", "radix"]
      animation:
        type: "string"
        examples: ["motion-dev", "framer-motion", "gsap"]
      icons:
        type: "string"
        examples: ["lucide", "phosphor", "heroicons"]
      shared_configs:
        type: "array"
        items: "string"
        description: "Shared config packages to include in the project"

  negotiation:
    type: "string"
    required: true
    allowed_values:
      - "confirm"
      - "full"
    description: >
      confirm: present stack_defaults for approval, user can override individual values.
      full: ask about every stack choice with no pre-filled defaults.

  code_audit:
    type: "boolean"
    required: true
    description: "Whether to run code audit skill on existing codebases to detect conventions"

  tdd:
    type: "boolean|detect"
    required: true
    allowed_values: [true, false, "detect"]
    description: >
      true: always enable TDD workflow.
      false: disable TDD.
      detect: enable if vitest/jest config and test files exist in the project.

  e2e:
    type: "boolean|detect"
    required: true
    allowed_values: [true, false, "detect"]
    description: >
      true: always enable E2E testing.
      false: disable E2E.
      detect: enable if /e2e/ directory and playwright config exist in the project.

  visual_verification:
    type: "boolean"
    required: true
    description: "Whether to use visual verification (screenshots) for design QA"

  error_pages:
    type: "object"
    required: true
    properties:
      include:
        type: "boolean"
        description: "Whether to generate error pages"
      types:
        type: "array"
        items: "string"
        allowed_values: ["404", "500", "403", "generic"]
        description: "Error page types to generate"
