# Trace Schema
# Defines the structure of .ai/projects/[name]/traces/[skill]-[timestamp].yml
# Version: 1.0.0

_meta:
  schema: "trace"
  version: "1.0.0"
  plugin: "agency"
  description: "Per-skill-run trace file capturing decisions, reasoning, uncertainty, and timing."

schema:
  _meta:
    type: map
    required: true
    fields:
      schema:
        type: string
        const: "trace"
      version:
        type: string
        required: true
      skill:
        type: string
        required: true
        description: "Skill name (e.g. feature-decomposer)"
      module:
        type: string
        required: true
        enum: ["brand", "design", "content", "dev", "devops"]
      project:
        type: string
        required: true
      started_at:
        type: string
        format: "ISO 8601"
        required: true
      ended_at:
        type: string
        format: "ISO 8601"
        required: false
      duration_seconds:
        type: number
        required: false
        description: "Wall-clock duration; null until run completes"
      token_estimate:
        type: number
        required: true
        description: "Sum of all step token estimates"
      trace_mode:
        type: string
        required: true
        enum: ["full", "decision-only"]

  steps:
    type: list
    required: true
    item_schema:
      step:
        type: string
        required: true
        description: "Must match ## Step N: heading from process.md"
      started_at:
        type: string
        format: "ISO 8601"
        required: false
      inputs_read:
        type: list
        required: false
        description: "Full mode only"
        item_schema:
          path:
            type: string
          summary:
            type: string
      decision:
        type: string
        required: true
      reasoning:
        type: string
        required: false
        description: "Full mode only"
      alternatives_considered:
        type: list
        required: false
        description: "Full mode only"
        item_type: string
      uncertainty:
        type: number
        required: true
        min: 0.0
        max: 1.0
        description: "0.0 = certain, 1.0 = guessing"
      quality_assessment:
        type: string
        required: false
        description: "Full mode only"
      flags:
        type: list
        required: false
        item_type: string
        enum_values: ["missing_input", "ambiguous_spec", "low_confidence", "schema_mismatch", "fallback_used"]
      token_estimate_step:
        type: number
        required: false
        description: "Full mode only"

  checkpoint_result:
    type: map
    required: false
    fields:
      status:
        type: string
        enum: ["passed", "failed"]
      checks_run:
        type: number
      checks_passed:
        type: number
      failure_details:
        type: list
        item_type: string

  quality_summary:
    type: map
    required: false
    fields:
      avg_uncertainty:
        type: number
      lowest_confidence_step:
        type: string
      flags_raised:
        type: list
        item_type: string
      recommendation:
        type: string

  errors_during_run:
    type: list
    required: true
    default: []
    description: "Errors from state.yml that occurred during this skill run"
