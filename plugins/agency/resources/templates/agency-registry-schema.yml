# Agency Registry Schema
# Defines the structure of .ai/agency.yml — the master project registry
# Version: 1.0.0

_meta:
  schema: "agency-registry"
  version: "1.0.0"
  plugin: "agency"
  description: "Master registry for all agency projects. One per workspace."

schema:
  # Active project pointer — which project is currently being worked on
  active:
    type: string
    required: true
    description: "Name of the currently active project. Must match a key in projects."
    example: "acme"

  # Project list — each project is an isolated tenant
  projects:
    type: map
    required: true
    description: "Map of project name → project configuration. Each project is fully isolated."
    value_schema:
      app_path:
        type: string
        required: true
        description: "Path to the application root (relative to workspace root)"
        example: "apps/acme-web"

      brand_package_path:
        type: string
        required: false
        description: "Path to the brand-specific package (relative to workspace root). Null if brand not yet loaded."
        example: "packages/brand/acme"

      brand_reference:
        type: string
        required: false
        description: "Path to the brand-reference.yml file for this project"
        example: ".ai/projects/acme/brand/brand-reference.yml"

      project_dir:
        type: string
        required: true
        description: "Path to the .ai/projects/[name]/ directory containing all project state and outputs"
        example: ".ai/projects/acme"

      created_at:
        type: string
        format: "ISO 8601"
        required: true

      modules:
        type: map
        required: true
        description: "Status of each module for this project (not_started | in_progress | completed | skipped)"
        value_schema:
          type: string
          enum: ["not_started", "in_progress", "completed", "skipped"]
        default_keys:
          - brand
          - design
          - content
          - dev
          - devops

  # Shared packages — platform-level, brand-agnostic
  shared_packages:
    type: list
    required: false
    description: "List of shared package paths that any project can consume. Brand-agnostic."
    item_schema:
      path:
        type: string
        description: "Path to shared package (relative to workspace root)"
        example: "packages/shared"
      name:
        type: string
        description: "Package name for reference"
        example: "@workspace/shared"

# ─────────────────────────────────────────
# Example instance
# ─────────────────────────────────────────

example:
  active: "acme"
  projects:
    acme:
      app_path: "apps/acme-web"
      brand_package_path: "packages/brand/acme"
      brand_reference: ".ai/projects/acme/brand/brand-reference.yml"
      project_dir: ".ai/projects/acme"
      created_at: "2026-03-03T00:00:00Z"
      modules:
        brand: "completed"
        design: "in_progress"
        content: "not_started"
        dev: "not_started"
        devops: "not_started"
  shared_packages:
    - path: "packages/shared"
      name: "@workspace/shared"
    - path: "packages/ui"
      name: "@workspace/ui"

# ─────────────────────────────────────────
# Isolation rules
# ─────────────────────────────────────────

isolation_rules:
  - "Projects NEVER share brand assets, tokens, or content"
  - "If two projects use the same font, each has its own copy"
  - "Cross-project data access is blocked by PreToolUse hook"
  - "Switching active project requires /agency:switch command"
  - "Only the active project's paths are writable"
