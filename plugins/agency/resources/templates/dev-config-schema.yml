# Dev Config Schema
# Defines the structure of .ai/projects/[name]/dev/dev-config.yml
# Version: 1.0.0

_meta:
  schema: "dev-config"
  version: "1.0.0"
  plugin: "agency"
  description: "Central project contract generated by config-generator. Consumed by all downstream dev skills."

schema:
  # ─────────────────────────────────────────
  # Meta — identity and generation info
  # ─────────────────────────────────────────

  meta:
    type: map
    required: true
    description: "Config identity and generation metadata"
    fields:
      plugin_name:
        type: string
        required: true
        default: "agency"
      project_name:
        type: string
        required: true
        description: "Project name (matches key in agency.yml)"
      project_root:
        type: string
        required: true
        description: "Absolute path to project root"
      created_at:
        type: string
        format: "ISO 8601"
        required: true
      updated_at:
        type: string
        format: "ISO 8601"
        required: true
      version:
        type: string
        required: true
        default: "1.0"
      generated_by:
        type: string
        required: true
        default: "agency v1.0.0"

  # ─────────────────────────────────────────
  # Frameworks — categorized dependency list
  # ─────────────────────────────────────────

  frameworks:
    type: map
    required: true
    description: "Detected and confirmed frameworks, grouped by role"
    fields:
      runtime:
        type: list
        required: true
        item_type: map
        description: "App frameworks (Next.js, Nuxt, Express, NestJS, etc.)"
        item_fields:
          name:
            type: string
            required: true
          version:
            type: string
            required: false
          confidence:
            type: string
            enum: ["high", "medium", "low"]
            required: false
      build:
        type: list
        required: false
        item_type: map
        description: "Build tools (Vite, Webpack, Turborepo, esbuild, etc.)"
        item_fields:
          name:
            type: string
            required: true
          version:
            type: string
            required: false
      testing:
        type: list
        required: false
        item_type: map
        description: "Test frameworks (Jest, Vitest, Playwright, Cypress, etc.)"
        item_fields:
          name:
            type: string
            required: true
          version:
            type: string
            required: false
      database:
        type: list
        required: false
        item_type: map
        description: "Database/ORM tools (Prisma, Drizzle, TypeORM, etc.)"
        item_fields:
          name:
            type: string
            required: true
          version:
            type: string
            required: false

  # ─────────────────────────────────────────
  # Conventions — project standards
  # ─────────────────────────────────────────

  conventions:
    type: map
    required: true
    description: "Project conventions and standards"
    fields:
      language:
        type: string
        required: true
        enum: ["typescript", "javascript", "python", "go", "rust", "other"]
      package_manager:
        type: string
        required: true
        enum: ["npm", "yarn", "pnpm", "bun"]
      monorepo:
        type: boolean
        required: true
        default: false
      monorepo_tool:
        type: string
        required: false
        description: "Turborepo, Nx, Lerna, etc."
      architecture:
        type: string
        required: false
        enum: ["monolith", "microservices", "modular-monolith", "serverless"]
      api_style:
        type: string
        required: false
        enum: ["rest", "graphql", "trpc", "grpc", "mcp", "websocket", "mixed"]
      state_management:
        type: string
        required: false
        description: "Zustand, Redux, Jotai, etc."
      branch_pattern:
        type: string
        required: false
        description: "e.g. feature/<KEY>-<desc>"
      commit_format:
        type: string
        required: false
        description: "e.g. JIRA-KEY: description"
      default_branch:
        type: string
        required: false
        default: "main"
      linter:
        type: string
        required: false
        description: "ESLint, Biome, etc."
      formatter:
        type: string
        required: false
        description: "Prettier, Biome, etc."
      coverage_threshold:
        type: number
        required: false
        default: 80
        description: "Target test coverage percentage (0-100)"

  # ─────────────────────────────────────────
  # Commands — mapped from package.json scripts
  # ─────────────────────────────────────────

  commands:
    type: map
    required: true
    description: "Build, dev, test, and quality commands"
    fields:
      build:
        type: string
        required: true
        description: "Production build command"
      dev:
        type: string
        required: false
        description: "Development server command"
      test:
        type: string
        required: false
        description: "Unit test command"
      test_related:
        type: string
        required: false
        description: "Run tests related to changed files"
      lint:
        type: string
        required: false
        description: "Lint check command"
      format:
        type: string
        required: false
        description: "Format check command"
      typecheck:
        type: string
        required: false
        description: "Type checking command (TypeScript projects)"

  # ─────────────────────────────────────────
  # Structure — project layout
  # ─────────────────────────────────────────

  structure:
    type: map
    required: false
    description: "Source code structure and key paths"
    fields:
      src_root:
        type: string
        required: false
        description: "Root source directory (e.g. src/, app/)"
      entry_points:
        type: list
        required: false
        item_type: map
        item_fields:
          path:
            type: string
            required: true
          type:
            type: string
            required: false
            description: "e.g. app-router, api, main"
      key_directories:
        type: list
        required: false
        item_type: map
        item_fields:
          path:
            type: string
            required: true
          purpose:
            type: string
            required: false
      component_library:
        type: string
        required: false
        description: "shadcn/ui, Material UI, etc."
      icon_library:
        type: string
        required: false
        description: "Lucide, Heroicons, etc."

  # ─────────────────────────────────────────
  # Design Tokens — design system integration
  # ─────────────────────────────────────────

  design_tokens:
    type: map
    required: true
    description: "Design system and token file paths. Values may be null if not yet available."
    fields:
      tailwind_config:
        type: string
        required: false
        nullable: true
        description: "Path to tailwind.config.* file"
      css_variables:
        type: string
        required: false
        nullable: true
        description: "Path to CSS variables file (variables.css, globals.css)"
      tokens_dtcg:
        type: string
        required: false
        nullable: true
        description: "Path to DTCG design token file (tokens.dtcg.json)"
      design_system:
        type: string
        required: false
        nullable: true
        description: "Design system name (tailwind, css-modules, styled-components, plain-css, other, none)"
      storybook:
        type: boolean
        required: false
        default: false
        description: "Whether Storybook is configured"

  # ─────────────────────────────────────────
  # Scan — metadata from project-scanner
  # ─────────────────────────────────────────

  scan:
    type: map
    required: false
    description: "Scanner metadata — populated by project-scanner"
    fields:
      last_scan_at:
        type: string
        format: "ISO 8601"
        required: false
      file_hashes:
        type: list
        required: false
        item_type: string
        description: "Tracked file hashes for delta scanning"
      files_tracked:
        type: number
        required: false
        default: 0
      scan_duration_ms:
        type: number
        required: false
        default: 0
