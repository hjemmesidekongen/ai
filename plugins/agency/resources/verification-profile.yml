# Agency Plugin — Verification Profile
# Central QA configuration for the agency pipeline.
# Per-skill checkpoints live in each skill's SKILL.md frontmatter (canonical source).
# Referenced by agency pipeline commands (design, content, build, deploy).

profile_name: "agency"
version: "1.1.0"

# ──────────────────────────────────────────────
# QA Strategy
# ──────────────────────────────────────────────

qa_strategy:
  frequency: "final"           # QA runs on the final wave only
  two_stage: true              # Stage 1 (spec compliance) gates Stage 2 (quality)
  stage_1_tier: "junior"       # Haiku — mechanical checks
  stage_2_tier: "principal"    # Opus — quality review
  max_retry_rounds: 3

# ──────────────────────────────────────────────
# Verification Types Used
# ──────────────────────────────────────────────

verification_types:
  data_validation:
    source: "built-in"
    used_by: [brand-loader, component-specs, web-layout, app-copy, ux-writing, config-generator, feature-decomposer, team-planner, agent-dispatcher, code-review, qa-validation, deploy-config, storybook-generator, brainstorm-session, brainstorm-decision-writer, decision-reader]

  file_validation:
    source: "built-in"
    used_by: [logo-assets]

  accessibility_validation:
    source: "built-in"
    used_by: [design-tokens]

  code_quality_gate:
    source: "dev (registered)"
    used_by: [scaffold, completion-gate, deploy-execute]

  manual_approval:
    source: "built-in"
    used_by: [project-scanner]

  visual_validation:
    source: "built-in"
    used_by: [visual-render, visual-verification]

# ──────────────────────────────────────────────
# Per-Skill Checkpoints
# ──────────────────────────────────────────────
# Canonical checkpoint definitions live in each skill's SKILL.md frontmatter.
# Format: checkpoint: { type, required_checks: [...], on_fail, on_pass }
# Run smoke test (Agent 5) to validate consistency across all 36 skills.
# Do NOT duplicate checkpoint definitions here — that causes drift.

# ──────────────────────────────────────────────
# Quality Focus Areas (for Stage 2 QA reviewer)
# ──────────────────────────────────────────────

qa_focus:
  - "Progressive disclosure enforced — all SKILL.md under 80 lines"
  - "Every skill has checkpoint in SKILL.md frontmatter (canonical source)"
  - "PORT skills preserve all logic from source plugin"
  - "NEW skills have complete process.md with no placeholder sections"
  - "Asset-registry integration in all asset-producing skills"
  - "Design tokens use WCAG-validated contrast pairs"
  - "Project isolation enforced across all write paths"
  - "Model tier assigned on every task"
  - "Findings persistence in all skills"
  - "Two-stage verification in all active-output skills"
  - "Error logging to state.yml in all skills"
