# ============================================================
# Plugin Design — dev
# ============================================================
# Generated by: plugin-design-interview skill
# Date: 2026-03-02
# Status: approved
# Brainstorm: dev-claude-plugin (16 decisions applied)
#
# This file is consumed by:
#   - plugin-spec-generator (produces implementation plan + addendum)
#   - plugin-execution-guide-generator (produces build guide)
#   - plugin-scaffolder (creates directories + plugin.json)
# ============================================================

name: "dev"
description: "Provides a multi-agent development team with project-aware knowledge, framework packs, and a 4-phase execution flow (decompose, plan, execute, review) for building software with parallel specialist agents."

persona:
  role: "Developer / Tech Lead"
  technical_level: "developer"
  cares_about: "code quality, execution speed, cost efficiency (right model tier per task)"

needs_brand: false
brand_sections_optional:
  project-planning:
    - identity
    - audience
  design-specs:
    - colors
    - typography
    - visual
    - logo
  scope-validation:
    - voice
    - audience

commands:
  - name: "dev:init"
    purpose: "Scan project, detect frameworks, produce dev-config.yml and knowledge files"
    interactive: true
    uses_planner: false

  - name: "dev:build"
    purpose: "Main workflow — decompose, plan, execute, and review a feature with the full agent team"
    interactive: true
    uses_planner: true

  - name: "dev:scan"
    purpose: "Delta scan — detect changes since last init, update knowledge files"
    interactive: false
    uses_planner: false

  - name: "dev:status"
    purpose: "Show current team state — active tasks, agent assignments, blockers"
    interactive: false
    uses_planner: false

skills:
  # --- Phase 0: Setup (/dev:init) ---
  - name: "project-scanner"
    purpose: "Static analysis — detect frameworks, conventions, and patterns in the project"
    interactive: false
    depends_on: []
    reads:
      - "project source files (static analysis)"
    writes:
      - "scan-results (internal, passed to config-generator)"
    checkpoint:
      type: "data_validation"
      checks:
        - "Scan results are non-empty"
        - "At least 1 framework detected or explicitly marked as none"

  - name: "config-generator"
    purpose: "Produce dev-config.yml from scan results, user confirms framework choices and conventions"
    interactive: true
    depends_on:
      - "project-scanner"
    reads:
      - "scan-results from project-scanner"
    writes:
      - ".ai/dev/[project-name]/dev-config.yml"
    checkpoint:
      type: "data_validation"
      checks:
        - "dev-config.yml exists at expected path"
        - "Has non-empty frameworks array"
        - "User has confirmed choices (status: confirmed)"

  - name: "knowledge-initializer"
    purpose: "Generate tagged knowledge files and mermaid architecture diagrams from project scan"
    interactive: false
    depends_on:
      - "config-generator"
    reads:
      - ".ai/dev/[project-name]/dev-config.yml"
      - "project source files"
    writes:
      - ".ai/dev/[project-name]/knowledge/*.yml"
      - ".ai/dev/[project-name]/knowledge/architecture.md"
    checkpoint:
      type: "file_validation"
      checks:
        - "At least 1 knowledge file created"
        - "All knowledge files have frontmatter with tags array"
        - "Architecture diagram contains at least 1 mermaid block"

  # --- Phase 1: Decompose (/dev:build) ---
  - name: "feature-decomposer"
    purpose: "PM breaks feature into components, architect defines boundaries, designer produces visual specs, PO validates scope"
    interactive: true
    depends_on:
      - "config-generator"
    reads:
      - ".ai/dev/[project-name]/dev-config.yml"
      - ".ai/dev/[project-name]/knowledge/*.yml"
      - "brand-reference.yml (optional, via brand-context-loader)"
    writes:
      - "decomposition document (components, boundaries, visual specs)"
    checkpoint:
      type: "data_validation"
      checks:
        - "At least 1 component defined with clear boundaries"
        - "Architect boundaries are non-empty for each component"
        - "PO scope validation recorded (approved/revised)"

  # --- Phase 2: Plan (/dev:build) ---
  - name: "team-planner"
    purpose: "PM creates work packages, TLs assign tasks and tiers to their teams, verify file overlap, assemble wave plan"
    interactive: true
    depends_on:
      - "feature-decomposer"
    reads:
      - "decomposition document from feature-decomposer"
      - ".ai/dev/[project-name]/dev-config.yml"
    writes:
      - "wave plan with task assignments, tiers, and file ownership"
    checkpoint:
      type: "data_validation"
      checks:
        - "Wave plan has at least 1 wave"
        - "Every task has an assigned agent and model tier"
        - "File ownership verified — no two agents touch the same file in a wave"
        - "TL sign-off recorded for frontend and backend task lists"

  # --- Phase 3: Execute (/dev:build) ---
  - name: "agent-dispatcher"
    purpose: "Dispatch specialist agents via Task(), manage parallel waves, collect structured reports"
    interactive: false
    depends_on:
      - "team-planner"
    reads:
      - "wave plan from team-planner"
      - ".ai/dev/[project-name]/knowledge/*.yml (tag-filtered per task)"
    writes:
      - "subagent reports (per task)"
      - ".ai/dev/[project-name]/team-state.yml"
    checkpoint:
      type: "data_validation"
      checks:
        - "All tasks in wave dispatched"
        - "Subagent reports collected for every dispatched task"
        - "team-state.yml updated with commit SHAs"

  - name: "completion-gate"
    purpose: "Per-agent pragmatic gate — project builds, lint clean, related tests pass"
    interactive: false
    depends_on:
      - "agent-dispatcher"
    reads:
      - "subagent reports from agent-dispatcher"
      - ".ai/dev/[project-name]/dev-config.yml (build/lint/test commands)"
    writes:
      - "gate results (pass/fail per agent, failure details)"
    checkpoint:
      type: "code_quality_gate"
      checks:
        - "Project builds successfully"
        - "Linting passes with zero errors"
        - "Tests for changed files pass"
        - "On failure: agent fixes while context is fresh before reporting done"

  # --- Phase 4: Review (/dev:build) ---
  - name: "code-review"
    purpose: "Code reviewer audits full diff for the wave — quality, patterns, security"
    interactive: false
    depends_on:
      - "completion-gate"
    reads:
      - "git diff for the wave (BASE_SHA..HEAD_SHA)"
      - ".ai/dev/[project-name]/dev-config.yml (conventions)"
    writes:
      - "code review report (findings, severity, file annotations)"
    checkpoint:
      type: "data_validation"
      checks:
        - "Review report produced"
        - "All changed files covered in review"
        - "Each finding has severity rating (critical/warning/info)"

  - name: "qa-validation"
    purpose: "QA validates against spec, PO checks end-goal alignment"
    interactive: false
    depends_on:
      - "code-review"
    reads:
      - "decomposition document (original spec)"
      - "code review report"
      - "subagent reports"
    writes:
      - "QA report (spec alignment, PO sign-off, build report)"
    checkpoint:
      type: "data_validation"
      checks:
        - "QA report produced with spec alignment score"
        - "PO sign-off recorded (approved/revisions needed)"
        - "Build report generated with agent summary and test results"

  # --- Delta Scan (/dev:scan) ---
  - name: "delta-scanner"
    purpose: "File hash comparison, detect changes since last scan, curate knowledge updates with maturity lifecycle"
    interactive: false
    depends_on: []
    reads:
      - ".ai/dev/[project-name]/dev-config.yml"
      - ".ai/dev/[project-name]/knowledge/*.yml (existing hashes)"
      - "project source files"
    writes:
      - ".ai/dev/[project-name]/knowledge/*.yml (updated)"
    checkpoint:
      type: "data_validation"
      checks:
        - "Hash comparison completed for all tracked files"
        - "Changed files identified and curated (worth knowing? which tags?)"
        - "Knowledge entries updated with correct maturity status"

  # --- Tier Management (utility) ---
  - name: "tier-assigner"
    purpose: "Self-tiering logic for domain specialists — assess complexity at Haiku cost, auto-escalate on failure"
    interactive: false
    depends_on: []
    reads:
      - "task brief from team-planner"
    writes:
      - "tier assignment (declared tier, reasoning)"
    checkpoint:
      type: "data_validation"
      checks:
        - "Tier assigned from valid set (junior/senior/principal)"
        - "Tier respects model floors (code-reviewer and security never below Sonnet)"
        - "Escalation path defined (failure → next tier → blocked at Opus)"

output:
  yaml:
    name: "dev-config.yml"
    storage_path: ".ai/dev/[project-name]/"
    description: "Project configuration, framework declarations, knowledge files, and team state"
  document:
    format: "md"
    sections:
      - "Architecture Diagram"
      - "Build Report"
  assets:
    - type: "code"
      format: "various"
      description: "Source code committed by specialist agents"
    - type: "config"
      format: "yml"
      description: "Tagged knowledge files with maturity lifecycle"

verification_profile:
  after_each_wave:
    - data_validation
    - code_quality_gate
  final:
    - code_quality_gate
    - data_validation
  qa_frequency: "every_wave"
  qa_focus:
    - "Agent output builds and passes lint"
    - "Related tests pass for all changed files"
    - "File ownership respected — no cross-agent conflicts"
    - "Model tier appropriate for task complexity"

# New verification type introduced by this plugin
custom_verification_types:
  - name: "code_quality_gate"
    description: "Verifies agent output is production-ready — build, lint, and related tests pass"
    checks:
      - "Project builds successfully (command from dev-config.yml)"
      - "Linting passes with zero errors (command from dev-config.yml)"
      - "Tests for changed files pass (scoped test run)"
    tool: "shell_command"

wave_plan:
  # /dev:init flow
  - wave: 1
    parallel: false
    skills:
      - "project-scanner"
    verification:
      - "data_validation"

  - wave: 2
    parallel: false
    skills:
      - "config-generator"
    verification:
      - "data_validation"

  - wave: 3
    parallel: false
    skills:
      - "knowledge-initializer"
    verification:
      - "file_validation"

  # /dev:build flow
  - wave: 4
    parallel: false
    skills:
      - "feature-decomposer"
    verification:
      - "data_validation"

  - wave: 5
    parallel: false
    skills:
      - "team-planner"
    verification:
      - "data_validation"

  - wave: 6
    parallel: true
    skills:
      - "agent-dispatcher"
      - "tier-assigner"
    verification:
      - "data_validation"

  - wave: 7
    parallel: true
    skills:
      - "completion-gate"
    verification:
      - "code_quality_gate"

  - wave: 8
    parallel: true
    skills:
      - "code-review"
      - "qa-validation"
    verification:
      - "data_validation"

  # /dev:scan flow (independent)
  - wave: 9
    parallel: false
    skills:
      - "delta-scanner"
    verification:
      - "data_validation"

decisions_applied:
  - d1   # single plugin, all-in-one
  - d2   # agents scoped to plugin
  - d3   # framework packs, tag-based loading
  - d4   # /dev:init scan + config + knowledge
  - d5   # tag-based knowledge, maturity lifecycle
  - d6   # two memory systems (agent knowledge + session memory)
  - d7   # pragmatic completion gate
  - d8   # 4-phase execution flow
  - d9   # self-tiering for domain specialists
  - d10  # communication chain
  - d11  # agent roster (5 leadership + 10 specialist)
  - d12  # integrates with existing task-planner
  - d13  # concise positive prompts
  - d14  # dev-config.yml as central contract
  - d15  # cascading failure + impact analysis
  - d16  # --brainstorm flag for name mismatch
