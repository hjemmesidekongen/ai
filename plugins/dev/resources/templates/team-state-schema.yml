# ============================================================
# TEAM STATE SCHEMA
# Tracks agent assignments and build progress during /dev:build
# One instance per build invocation. Ephemeral — not shared across builds.
# ============================================================

meta:
  plugin_name:
    type: string
    required: true
    default: "dev"
    description: "Always 'dev'"
  project_name:
    type: string
    required: true
    description: "Project name from dev-config.yml"
  build_id:
    type: string
    required: true
    description: "Unique identifier per /dev:build invocation"
  created_at:
    type: string
    format: iso8601
    required: true
    description: "When this build started"
  updated_at:
    type: string
    format: iso8601
    required: true
    description: "Last time state was modified"
  version:
    type: string
    required: true
    default: "1.0"
    description: "Schema version"
  generated_by:
    type: string
    required: true
    default: "dev v1.0.0"
    description: "Plugin version"

# --------------------------------------------------
# BUILD CONTEXT
# --------------------------------------------------
build:
  feature_description:
    type: string
    required: true
    description: "What the user asked to build"
  status:
    type: string
    required: true
    enum: ["decomposing", "planning", "executing", "reviewing", "complete", "blocked"]
    description: "Current build status"
  current_phase:
    type: number
    required: true
    enum: [1, 2, 3, 4]
    description: "Current phase (1=decompose, 2=plan, 3=execute, 4=review)"
  started_at:
    type: string
    format: iso8601
    required: true
    description: "When the build started"
  completed_at:
    type: string
    format: iso8601
    required: false
    description: "When the build completed (null if in progress)"

# --------------------------------------------------
# DECOMPOSITION (Phase 1 output)
# --------------------------------------------------
decomposition:
  components:
    type: array
    required: true
    description: "Feature broken into components by architect"
    items:
      name:
        type: string
        required: true
        description: "Component name"
      description:
        type: string
        required: true
        description: "What this component does"
      boundaries:
        type: string
        required: true
        description: "What this component owns"
      type:
        type: string
        required: true
        enum: ["frontend", "backend", "shared", "infrastructure"]
        description: "Component category"
      files_affected:
        type: array
        required: true
        description: "Paths that will be created/modified"
        items:
          type: string
  designer_specs:
    type: array
    required: false
    description: "Visual specifications for UI components"
    items:
      component:
        type: string
        required: true
        description: "References components[].name"
      visual_spec:
        type: string
        required: true
        description: "Description of visual requirements"
      wireframe_notes:
        type: string
        required: false
        description: "Wireframe or layout notes"
  po_validation:
    status:
      type: string
      required: true
      enum: ["approved", "revised", "rejected"]
      description: "Product owner validation status"
    notes:
      type: string
      required: false
      description: "PO feedback notes"

# --------------------------------------------------
# WAVE PLAN (Phase 2 output)
# --------------------------------------------------
wave_plan:
  waves:
    type: array
    required: true
    description: "Ordered waves of parallelizable tasks"
    items:
      wave:
        type: number
        required: true
        description: "Wave number (1-indexed)"
      parallel:
        type: boolean
        required: true
        description: "Whether tasks in this wave can run in parallel"
      tasks:
        type: array
        required: true
        items:
          id:
            type: string
            required: true
            description: "Task ID (e.g., 'T1')"
          description:
            type: string
            required: true
            description: "What this task does"
          assigned_agent:
            type: string
            required: true
            description: "Agent role from roster"
          model_tier:
            type: string
            required: true
            enum: ["junior", "senior", "principal"]
            description: "Assigned model tier"
          declared_tier:
            type: string
            required: false
            enum: ["junior", "senior", "principal", null]
            description: "Self-tiered agents may declare a different tier"
          component:
            type: string
            required: true
            description: "References decomposition.components[].name"
          files_owned:
            type: array
            required: true
            description: "Exclusive file ownership for this task"
            items:
              type: string
          depends_on:
            type: array
            required: false
            description: "Task IDs this depends on"
            items:
              type: string
          status:
            type: string
            required: true
            enum: ["pending", "dispatched", "in_progress", "completed", "failed", "blocked"]
            default: "pending"
            description: "Task execution status"
          base_sha:
            type: string
            required: false
            description: "Git SHA before task execution"
          commit_sha:
            type: string
            required: false
            description: "Git SHA after task commit"
  file_ownership:
    type: array
    required: true
    description: "Complete file ownership registry"
    items:
      file:
        type: string
        required: true
        description: "File path"
      owner_task:
        type: string
        required: true
        description: "Task ID that owns this file"
      wave:
        type: number
        required: true
        description: "Wave number this ownership applies to"

# --------------------------------------------------
# EXECUTION STATE (Phase 3)
# --------------------------------------------------
execution:
  current_wave:
    type: number
    required: false
    description: "Currently executing wave number"
  dispatched_tasks:
    type: array
    required: true
    description: "All dispatched task records"
    items:
      task_id:
        type: string
        required: true
        description: "Task ID"
      agent:
        type: string
        required: true
        description: "Agent role"
      tier:
        type: string
        required: true
        enum: ["junior", "senior", "principal"]
        description: "Model tier used"
      dispatched_at:
        type: string
        format: iso8601
        required: true
        description: "When task was dispatched"
      completed_at:
        type: string
        format: iso8601
        required: false
        description: "When task completed"
      status:
        type: string
        required: true
        enum: ["running", "completed", "failed"]
        description: "Dispatch status"
      report:
        type: object
        required: false
        description: "Task completion report"
        properties:
          files_changed:
            type: array
            required: true
            items:
              type: string
          tests_passed:
            type: boolean
            required: false
          lint_passed:
            type: boolean
            required: false
          build_passed:
            type: boolean
            required: false
          notes:
            type: string
            required: false
  commit_range:
    type: object
    required: false
    description: "Overall commit range for this build"
    properties:
      base_sha:
        type: string
        required: true
      head_sha:
        type: string
        required: true

# --------------------------------------------------
# REVIEW STATE (Phase 4)
# --------------------------------------------------
review:
  code_review:
    status:
      type: string
      required: false
      enum: ["pending", "passed", "failed", null]
      description: "Code review status"
    reviewer_tier:
      type: string
      required: false
      enum: ["junior", "senior", "principal", null]
      description: "Model tier of the reviewer"
    findings:
      type: array
      required: false
      description: "Code review findings"
      items:
        file:
          type: string
          required: true
          description: "File path"
        line:
          type: number
          required: false
          description: "Line number"
        severity:
          type: string
          required: true
          enum: ["critical", "warning", "info"]
          description: "Finding severity"
        message:
          type: string
          required: true
          description: "Finding description"
    completed_at:
      type: string
      format: iso8601
      required: false
  qa_validation:
    status:
      type: string
      required: false
      enum: ["pending", "passed", "failed", "passed_with_notes", null]
      description: "QA validation status"
    spec_alignment:
      type: number
      required: false
      description: "Spec alignment score (0-100)"
    po_signoff:
      type: string
      required: false
      enum: ["approved", "revisions_needed", null]
      description: "Product owner sign-off"
    notes:
      type: string
      required: false
      description: "QA notes"
    completed_at:
      type: string
      format: iso8601
      required: false

# --------------------------------------------------
# ERRORS
# --------------------------------------------------
errors:
  type: array
  required: true
  default: []
  description: "Persistent error log. Never delete entries — mark resolved instead."
  items:
    timestamp:
      type: string
      format: iso8601
      required: true
      description: "When the error occurred"
    skill:
      type: string
      required: true
      description: "Which skill/phase encountered the error"
    error:
      type: string
      required: true
      description: "What went wrong"
    attempted_fix:
      type: string
      required: false
      description: "What was tried to resolve it"
    result:
      type: string
      required: false
      enum: ["fixed", "escalated", "blocked"]
      description: "Outcome of the fix attempt"
    next_approach:
      type: string
      required: false
      description: "What to try next if not fixed"

# --------------------------------------------------
# BLOCKERS
# --------------------------------------------------
blockers:
  type: array
  required: true
  default: []
  description: "Active blockers that prevent progress"
  items:
    task_id:
      type: string
      required: true
      description: "Blocked task ID"
    reason:
      type: string
      required: true
      description: "Why the task is blocked"
    impact:
      type: object
      required: true
      properties:
        directly_blocked:
          type: array
          required: true
          description: "Task IDs directly blocked"
          items:
            type: string
        transitively_blocked:
          type: array
          required: false
          description: "Task IDs transitively blocked"
          items:
            type: string
    escalated_to_user:
      type: boolean
      required: true
      default: false
      description: "Whether this was escalated to the user"
    resolution:
      type: string
      required: false
      description: "How the blocker was resolved"
