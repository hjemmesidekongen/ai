# ============================================================
# DEV CONFIG SCHEMA
# Auto-generated by /dev:init, kept current by /dev:scan
# Other dev skills consume this file — do not restructure.
# ============================================================

meta:
  plugin_name:
    type: string
    required: true
    default: "dev"
    description: "Always 'dev'"
  project_name:
    type: string
    required: true
    description: "User's project name"
  project_root:
    type: string
    required: true
    description: "Absolute path to project root"
  created_at:
    type: string
    format: iso8601
    required: true
    description: "When config was first generated"
  updated_at:
    type: string
    format: iso8601
    required: true
    description: "Last time config was modified"
  version:
    type: string
    required: true
    default: "1.0"
    description: "Schema version"
  generated_by:
    type: string
    required: true
    default: "dev v1.0.0"
    description: "Plugin version that generated this config"

# --------------------------------------------------
# FRAMEWORKS
# --------------------------------------------------
frameworks:
  runtime:
    type: array
    required: true
    description: "Runtime frameworks (Next.js, Express, Fastify, etc.)"
    items:
      name:
        type: string
        required: true
        description: "Framework name (e.g., 'next.js', 'express', 'fastify')"
      version:
        type: string
        required: true
        description: "Detected version"
      config_file:
        type: string
        required: true
        description: "Path to config file (e.g., 'next.config.js')"
      detected_by:
        type: string
        required: true
        description: "How it was detected (e.g., 'package.json dependency')"
  build:
    type: array
    required: false
    description: "Build tools (turborepo, nx, webpack, vite, etc.)"
    items:
      name:
        type: string
        required: true
      version:
        type: string
        required: true
      config_file:
        type: string
        required: true
      detected_by:
        type: string
        required: true
  testing:
    type: array
    required: false
    description: "Testing frameworks (jest, vitest, playwright, etc.)"
    items:
      name:
        type: string
        required: true
      version:
        type: string
        required: true
      config_file:
        type: string
        required: true
      detected_by:
        type: string
        required: true
  database:
    type: array
    required: false
    description: "Database tools (prisma, drizzle, typeorm, etc.)"
    items:
      name:
        type: string
        required: true
      version:
        type: string
        required: true
      config_file:
        type: string
        required: true
      detected_by:
        type: string
        required: true

# --------------------------------------------------
# CONVENTIONS
# --------------------------------------------------
conventions:
  language:
    type: string
    required: true
    enum: ["typescript", "javascript", "python", "go", "rust", "other"]
    description: "Primary project language"
  package_manager:
    type: string
    required: true
    enum: ["npm", "yarn", "pnpm", "bun"]
    description: "Package manager in use"
  monorepo:
    type: boolean
    required: true
    description: "Whether project is a monorepo"
  monorepo_tool:
    type: string
    required: false
    enum: ["turborepo", "nx", "lerna", null]
    description: "Monorepo tool if applicable"
  style:
    linter:
      type: string
      required: false
      enum: ["eslint", "biome", "oxlint", null]
      description: "Linter in use"
    formatter:
      type: string
      required: false
      enum: ["prettier", "biome", null]
      description: "Formatter in use"
    linter_config:
      type: string
      required: false
      description: "Path to linter config file"
    formatter_config:
      type: string
      required: false
      description: "Path to formatter config file"
  git:
    branch_pattern:
      type: string
      required: true
      description: "Branch naming pattern (e.g., 'feature/<KEY>-<desc>')"
    commit_pattern:
      type: string
      required: true
      description: "Commit message format (e.g., 'JIRA-KEY: description')"
    main_branch:
      type: string
      required: true
      enum: ["main", "master"]
      description: "Default branch name"
  testing:
    unit_framework:
      type: string
      required: false
      description: "Unit test framework name"
    integration_framework:
      type: string
      required: false
      description: "Integration test framework name"
    e2e_framework:
      type: string
      required: false
      description: "E2E test framework name"
    coverage_threshold:
      type: number
      required: false
      description: "Target test coverage percentage (0-100)"
  architecture:
    pattern:
      type: string
      required: true
      enum: ["monolith", "microservices", "modular-monolith", "serverless"]
      description: "Overall architecture pattern"
    api_style:
      type: string
      required: true
      enum: ["rest", "graphql", "trpc", "grpc", "mixed"]
      description: "Primary API communication style"
    state_management:
      type: string
      required: false
      enum: ["redux", "zustand", "context", "jotai", null]
      description: "Frontend state management library"

# --------------------------------------------------
# COMMANDS
# --------------------------------------------------
commands:
  build:
    type: string
    required: true
    description: "Build command (e.g., 'npm run build')"
  dev:
    type: string
    required: true
    description: "Dev server command (e.g., 'npm run dev')"
  test:
    type: string
    required: true
    description: "Test command (e.g., 'npm test')"
  test_related:
    type: string
    required: false
    description: "Run tests related to changed files (e.g., 'npx jest --findRelatedTests')"
  lint:
    type: string
    required: true
    description: "Lint command (e.g., 'npx eslint .')"
  format:
    type: string
    required: false
    description: "Format command (e.g., 'npx prettier --write .')"
  typecheck:
    type: string
    required: false
    description: "Type-check command (e.g., 'npx tsc --noEmit')"

# --------------------------------------------------
# STRUCTURE
# --------------------------------------------------
structure:
  src_root:
    type: string
    required: true
    description: "Source root directory (e.g., 'src/', 'app/', 'packages/')"
  entry_points:
    type: array
    required: true
    description: "Application entry points"
    items:
      path:
        type: string
        required: true
        description: "Path to entry point (e.g., 'src/index.ts')"
      type:
        type: string
        required: true
        enum: ["app", "api", "worker", "library"]
        description: "Entry point type"
  key_directories:
    type: array
    required: true
    description: "Important directories in the project"
    items:
      path:
        type: string
        required: true
        description: "Directory path (e.g., 'src/components/')"
      purpose:
        type: string
        required: true
        description: "What this directory contains (e.g., 'React UI components')"
  component_library:
    type: string
    required: false
    enum: ["shadcn/ui", "material-ui", "ant-design", "chakra-ui", null]
    description: "UI component library if detected"
  icon_library:
    type: string
    required: false
    enum: ["lucide-react", "heroicons", "react-icons", null]
    description: "Icon library if detected"

# --------------------------------------------------
# SCAN STATE
# --------------------------------------------------
scan:
  last_scan_at:
    type: string
    format: iso8601
    required: true
    description: "When the last scan ran"
  file_hashes:
    type: array
    required: true
    description: "Tracked file hashes for delta detection"
    items:
      path:
        type: string
        required: true
        description: "File path"
      hash:
        type: string
        required: true
        description: "SHA-256 of file contents"
  files_tracked:
    type: number
    required: true
    description: "Count of tracked files"
  scan_duration_ms:
    type: number
    required: true
    description: "How long the scan took in milliseconds"
