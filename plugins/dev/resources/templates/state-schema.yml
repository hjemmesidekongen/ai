# ============================================================
# DEV PLUGIN STATE SCHEMA
# Standard state.yml for the dev plugin, following the canonical
# schema at plugins/task-planner/resources/state-schema.yml.
# Stored at: ~/.claude/dev/[project-name]/state.yml
# ============================================================

state:
  # --- Execution context ---

  command:
    type: string
    required: true
    description: "The command that initiated this execution (e.g., 'dev:init', 'dev:build', 'dev:scan')"

  project:
    type: string
    required: true
    description: "Project name this state belongs to"

  started_at:
    type: string
    format: iso8601
    required: true
    description: "When execution began"

  updated_at:
    type: string
    format: iso8601
    required: true
    description: "Last time state was modified"

  status:
    type: string
    required: true
    enum: ["pending", "in_progress", "completed", "verified", "failed", "failed_spec", "failed_quality"]
    default: "pending"
    description: "Top-level execution status. Must be at column 0 (no indent) in YAML."

  # --- Phase tracking ---

  current_phase:
    type: string
    required: true
    description: "Name of the currently executing skill/phase"

  current_phase_number:
    type: integer
    required: true
    description: "1-indexed number of the current phase"

  total_phases:
    type: integer
    required: true
    description: "Total number of phases in this execution"

  # --- Phases array ---
  # Dev plugin phases map to the 4-phase execution flow:
  #   1. init (project-scanner + config-generator + knowledge-initializer)
  #   2. decompose (feature-decomposer + tier-assigner)
  #   3. plan (team-planner)
  #   4. execute (agent-dispatcher + completion-gate)
  #   5. review (code-review + qa-validation)

  phases:
    type: array
    required: true
    description: "Ordered list of all phases in this execution"
    items:
      name:
        type: string
        required: true
        enum: ["init", "decompose", "plan", "execute", "review"]
        description: "Phase name"

      number:
        type: integer
        required: true
        description: "1-indexed phase number"

      status:
        type: string
        required: true
        enum: ["pending", "in_progress", "completed", "failed", "failed_spec", "failed_quality", "passed_with_notes", "skipped"]
        default: "pending"
        description: "Phase-level status"

      started_at:
        type: string
        format: iso8601
        required: false

      completed_at:
        type: string
        format: iso8601
        required: false

      checkpoint:
        type: object
        required: false
        description: "Verification checkpoint result for this phase"
        properties:
          type:
            type: string
            required: true
            description: "Checkpoint type (data_validation, file_validation, code_quality_gate, etc.)"
          passed:
            type: boolean
            required: true
          details:
            type: string
            required: false

      artifacts:
        type: array
        required: false
        items:
          type: string
        description: "Files created or modified during this phase"

      commit_range:
        type: object
        required: false
        description: "Git commit range for this phase"
        properties:
          base_sha:
            type: string
            required: true
          head_sha:
            type: string
            required: true

  # --- Error tracking ---

  errors:
    type: array
    required: true
    default: []
    description: "Persistent error log. Never delete entries — mark resolved instead."
    items:
      timestamp:
        type: string
        format: iso8601
        required: true
        description: "When the error occurred"

      skill:
        type: string
        required: true
        description: "Which skill/phase encountered the error"

      error:
        type: string
        required: true
        description: "What went wrong (concise but specific)"

      attempted_fix:
        type: string
        required: true
        description: "What was tried to resolve it"

      result:
        type: string
        required: true
        enum: ["resolved", "partial", "unresolved"]
        description: "Outcome of the fix attempt"

      next_approach:
        type: string
        required: false
        description: "What to try next if result is not resolved"

  # --- Session recovery ---

  last_session_id:
    type: string
    required: false
    description: "Session ID of the last session that worked on this state"

  recovery_notes:
    type: string
    required: false
    description: >
      Human-readable notes about where execution stands and what's next.
      Written after each phase completes. Read by session-recovery.sh and
      by Claude when resuming after /compact or session restart.
