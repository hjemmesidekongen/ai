# dev plugin — Schema Archive v1.0.0
# Archived: 2026-03-02
# Contains: dev-config, team-state, knowledge-entry schema snapshots
# Used by: migration-guide-generator for field-by-field diffing

_meta:
  plugin: "dev"
  version: "1.0.0"
  archived_at: "2026-03-02"
  schemas:
    - dev-config-schema.yml
    - team-state-schema.yml
    - knowledge-entry-schema.yml

# ============================================================
# DEV CONFIG SCHEMA (v1.0.0)
# ============================================================
dev_config:
  meta:
    fields: [plugin_name, project_name, project_root, created_at, updated_at, version, generated_by]
    required: [plugin_name, project_name, project_root, created_at, updated_at, version, generated_by]
  frameworks:
    sections: [runtime, build, testing, database]
    item_fields: [name, version, config_file, detected_by]
  conventions:
    fields: [language, package_manager, monorepo, monorepo_tool]
    sections: [style, git, testing, architecture]
    style_fields: [linter, formatter, linter_config, formatter_config]
    git_fields: [branch_pattern, commit_pattern, main_branch]
    testing_fields: [unit_framework, integration_framework, e2e_framework, coverage_threshold]
    architecture_fields: [pattern, api_style, state_management]
  commands:
    fields: [build, dev, test, test_related, lint, format, typecheck]
    required: [build, dev, test, lint]
  structure:
    fields: [src_root, entry_points, key_directories, component_library, icon_library]
    entry_point_types: [app, api, worker, library]
  scan:
    fields: [last_scan_at, file_hashes, files_tracked, scan_duration_ms]

# ============================================================
# TEAM STATE SCHEMA (v1.0.0)
# ============================================================
team_state:
  meta:
    fields: [plugin_name, project_name, build_id, created_at, updated_at, version, generated_by]
  build:
    fields: [feature_description, status, current_phase, started_at, completed_at, base_sha]
    status_values: [decomposing, planning, planned, executing, reviewing, completed, failed]
  decomposition:
    fields: [components]
    component_fields: [name, type, description, dependencies, files_affected, boundary]
  wave_plan:
    fields: [waves]
    wave_fields: [number, name, tasks, parallel, qa_review, verification]
    task_fields: [id, name, assigned_agent, model_tier, files_owned, depends_on, status]
    model_tiers: [junior, senior, principal]
  execution:
    fields: [current_wave, completed_waves, dispatched_tasks, commit_range]

# ============================================================
# KNOWLEDGE ENTRY SCHEMA (v1.0.0)
# ============================================================
knowledge_entry:
  top_level:
    fields: [tags, maturity, created_at, updated_at, source, hash, entries]
    maturity_values: [candidate, established, proven, deprecated]
    source_values: [init-scan, delta-scan, manual, build-learning]
  entry_item:
    fields: [fact, confidence, evidence, related_tags]
    confidence_values: [high, medium, low]
