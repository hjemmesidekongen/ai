# Brand Reference Schema
# Defines the structure of brand-reference.yml — the machine-readable
# brand data file that all plugins consume.
#
# Location: .ai/brands/[brand]/brand-reference.yml
# Producer: /brand:generate or /brand:analyze
# Consumer: Any plugin via brand-context-loader skill

meta:
  type: object
  required: true
  description: "Brand metadata and versioning"
  properties:
    brand_name:
      type: string
      required: true
      description: "Official brand name"
    tagline:
      type: string
      required: false
      description: "Short tagline or slogan"
    industry:
      type: string
      required: true
      description: "Industry or category (e.g. SaaS, E-commerce, Agency)"
    website:
      type: string
      required: false
      format: url
      description: "Primary website URL"
    generated_date:
      type: string
      required: true
      format: date
      description: "Date brand-reference.yml was last generated"
    version:
      type: string
      required: true
      description: "Schema version (e.g. 1.0)"

# --------------------------------------------------
# IDENTITY
# --------------------------------------------------
identity:
  type: object
  required: true
  description: "Brand foundation — mission, vision, values, story, positioning"
  properties:
    mission:
      type: string
      required: true
      description: "One sentence mission statement"
    vision:
      type: string
      required: true
      description: "One sentence vision statement"
    values:
      type: array
      required: true
      min_items: 2
      items:
        name:
          type: string
          required: true
        description:
          type: string
          required: true
    brand_story:
      type: string
      required: false
      description: "2-3 paragraph brand origin story"
    positioning:
      type: object
      required: true
      properties:
        category:
          type: string
          required: true
          description: "Market category you compete in"
        target:
          type: string
          required: true
          description: "Who you serve (one line)"
        differentiator:
          type: string
          required: true
          description: "What makes you different (one line)"
        proof:
          type: string
          required: true
          description: "Why anyone should believe this"

# --------------------------------------------------
# VISUAL IDENTITY
# --------------------------------------------------
visual:
  type: object
  required: false
  description: "Logo, imagery, and layout guidelines"
  properties:
    logo:
      type: object
      required: false
      properties:
        primary:
          type: string
          required: true
          description: "Path to primary logo file"
        mark:
          type: string
          required: false
          description: "Path to logo mark (icon-only) file"
        variants:
          type: array
          required: false
          items:
            name:
              type: string
              required: true
            file:
              type: string
              required: true
            use_on:
              type: string
              required: true
              description: "When to use this variant"
        clear_space:
          type: string
          required: false
          description: "Minimum clear space rule"
        minimum_size:
          type: string
          required: false
          description: "Minimum display size for digital and print"
        misuse_rules:
          type: array
          required: false
          items:
            type: string
          description: "List of things to never do with the logo"
    imagery:
      type: object
      required: false
      properties:
        style:
          type: string
          required: true
          description: "Photography, Illustration, or Mixed"
        mood:
          type: string
          required: true
          description: "Overall visual mood"
        subjects:
          type: string
          required: false
          description: "What appears in imagery"
        avoid:
          type: string
          required: false
          description: "What to never show"
    layout:
      type: object
      required: false
      properties:
        grid:
          type: string
          required: false
        spacing_principle:
          type: string
          required: false
        alignment:
          type: string
          required: false

# --------------------------------------------------
# TYPOGRAPHY
# --------------------------------------------------
typography:
  type: object
  required: true
  description: "Font families, weights, and type scale"
  properties:
    primary:
      type: object
      required: true
      properties:
        family:
          type: string
          required: true
          description: "Primary font family name"
        use:
          type: string
          required: true
          description: "Where this font is used"
        weights:
          type: array
          required: true
          items:
            type: string
          description: "Available weights (e.g. 'Bold 700', 'Regular 400')"
        source:
          type: string
          required: false
          description: "Font source (Google Fonts, Adobe, licensed, system)"
    secondary:
      type: object
      required: false
      properties:
        family:
          type: string
          required: true
        use:
          type: string
          required: true
        weights:
          type: array
          required: true
          items:
            type: string
        source:
          type: string
          required: false
    scale:
      type: array
      required: true
      min_items: 3
      description: "Type scale from largest to smallest"
      items:
        level:
          type: string
          required: true
          description: "Scale level name (e.g. H1, H2, Body, Small)"
        size:
          type: string
          required: true
          description: "Size in px and rem (e.g. '48px / 3rem')"
        weight:
          type: string
          required: true
        line_height:
          type: string
          required: true
        use:
          type: string
          required: true
          description: "Where this level is used"

# --------------------------------------------------
# COLORS
# --------------------------------------------------
colors:
  type: object
  required: true
  description: "Full color system with accessibility data"
  properties:
    # Primary, secondary, and accent colors share this extended structure.
    # Each color includes tint/shade scales, pre-computed accessible pairs,
    # and colorblind safety notes (per addendum-assets-and-accessibility spec).

    primary:
      type: array
      required: true
      min_items: 1
      items:
        name:
          type: string
          required: true
        hex:
          type: string
          required: true
          pattern: "^#[0-9A-Fa-f]{6}$"
        rgb:
          type: string
          required: false
        hsl:
          type: string
          required: false
          description: "HSL representation (e.g. '217, 91%, 60%')"
        use:
          type: string
          required: true
        scale:
          type: object
          required: true
          description: "10-step tint/shade scale from 50 (lightest) to 900 (darkest)"
          properties:
            "50":  { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "100": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "200": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "300": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "400": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "500": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "600": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "700": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "800": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            "900": { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
        accessible_pairs:
          type: array
          required: true
          min_items: 1
          description: "Pre-computed contrast ratios for every intended pairing"
          items:
            foreground:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
            background:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
            contrast_ratio:
              type: number
              required: true
              description: "WCAG contrast ratio (e.g. 4.56)"
            wcag_aa_normal:
              type: boolean
              required: true
              description: "Passes AA for body text (≥ 4.5:1)"
            wcag_aa_large:
              type: boolean
              required: true
              description: "Passes AA for large text (≥ 3:1)"
            wcag_aaa_normal:
              type: boolean
              required: false
              description: "Passes AAA for body text (≥ 7:1)"
            wcag_aaa_large:
              type: boolean
              required: false
              description: "Passes AAA for large text (≥ 4.5:1)"
            use:
              type: string
              required: true
              description: "Where this pair is used"
            warning:
              type: string
              required: false
              description: "Set when pair fails AA — marks as decorative-only"
        colorblind_notes:
          type: object
          required: true
          description: "Visibility assessment for color vision deficiencies"
          properties:
            protanopia:
              type: string
              required: true
              description: "Red-blind assessment"
            deuteranopia:
              type: string
              required: true
              description: "Green-blind assessment"
            tritanopia:
              type: string
              required: true
              description: "Blue-blind assessment"
    secondary:
      type: array
      required: false
      description: "Same structure as primary (scale, accessible_pairs, colorblind_notes)"
      items:
        name: { type: string, required: true }
        hex: { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
        rgb: { type: string, required: false }
        hsl: { type: string, required: false }
        use: { type: string, required: true }
        scale: { type: object, required: true }
        accessible_pairs: { type: array, required: true, min_items: 1 }
        colorblind_notes: { type: object, required: true }
    accent:
      type: array
      required: false
      description: "Same structure as primary (scale, accessible_pairs, colorblind_notes)"
      items:
        name: { type: string, required: true }
        hex: { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
        rgb: { type: string, required: false }
        hsl: { type: string, required: false }
        use: { type: string, required: true }
        scale: { type: object, required: true }
        accessible_pairs: { type: array, required: true, min_items: 1 }
        colorblind_notes: { type: object, required: true }
    neutrals:
      type: array
      required: true
      min_items: 2
      items:
        name:
          type: string
          required: true
        hex:
          type: string
          required: true
          pattern: "^#[0-9A-Fa-f]{6}$"
        use:
          type: string
          required: true
    semantic:
      type: object
      required: false
      properties:
        success:
          type: string
          required: true
          pattern: "^#[0-9A-Fa-f]{6}$"
        warning:
          type: string
          required: true
          pattern: "^#[0-9A-Fa-f]{6}$"
        error:
          type: string
          required: true
          pattern: "^#[0-9A-Fa-f]{6}$"
        info:
          type: string
          required: true
          pattern: "^#[0-9A-Fa-f]{6}$"
    accessibility:
      type: array
      required: true
      min_items: 1
      description: "Contrast ratios for foreground/background pairs"
      items:
        pair:
          type: string
          required: true
          description: "Description of the pair (e.g. 'Brand Blue on White')"
        contrast_ratio:
          type: string
          required: true
          description: "Ratio as string (e.g. '4.56:1')"
        wcag_aa:
          type: boolean
          required: true
          description: "Passes WCAG AA (4.5:1 for normal text)"
        wcag_aaa:
          type: boolean
          required: false
          description: "Passes WCAG AAA (7:1 for normal text)"
    proportions:
      type: object
      required: false
      description: "Color usage proportions (e.g. 60/30/10 rule)"
      properties:
        rule:
          type: string
          required: true
        dominant:
          type: string
          required: true
        secondary:
          type: string
          required: true
        accent:
          type: string
          required: true
    dark_mode:
      type: object
      required: false
      description: "Dark mode color mapping with validated contrast pairs"
      properties:
        background:
          type: object
          required: true
          properties:
            base:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
              description: "Darkest background (replaces white)"
            surface:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
              description: "Card/panel background (slightly lighter than base)"
            elevated:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
              description: "Elevated surface (modals, dropdowns)"
        text:
          type: object
          required: true
          properties:
            primary:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
            secondary:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
            muted:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
        brand_adjustments:
          type: array
          required: false
          description: "Brand colors adjusted for dark backgrounds"
          items:
            original:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
            dark_mode:
              type: string
              required: true
              pattern: "^#[0-9A-Fa-f]{6}$"
            reason:
              type: string
              required: true
        accessible_pairs:
          type: array
          required: true
          min_items: 1
          description: "Same structure as color accessible_pairs, validated for dark backgrounds"
          items:
            foreground: { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            background: { type: string, required: true, pattern: "^#[0-9A-Fa-f]{6}$" }
            contrast_ratio: { type: number, required: true }
            wcag_aa_normal: { type: boolean, required: true }
            wcag_aa_large: { type: boolean, required: true }
            use: { type: string, required: true }

# --------------------------------------------------
# TONE OF VOICE
# --------------------------------------------------
voice:
  type: object
  required: true
  description: "Brand personality, tone spectrum, and messaging"
  properties:
    personality:
      type: array
      required: true
      min_items: 2
      items:
        attribute:
          type: string
          required: true
          description: "What the brand IS (e.g. 'Confident')"
        not:
          type: string
          required: true
          description: "What the brand is NOT (e.g. 'Arrogant')"
        description:
          type: string
          required: true
    spectrum:
      type: object
      required: true
      description: "Tone sliders on 1-10 scales"
      properties:
        formality:
          type: integer
          required: true
          minimum: 1
          maximum: 10
          description: "1 = very casual, 10 = very formal"
        humor:
          type: integer
          required: true
          minimum: 1
          maximum: 10
          description: "1 = never, 10 = always"
        enthusiasm:
          type: integer
          required: true
          minimum: 1
          maximum: 10
          description: "1 = reserved, 10 = excitable"
        technicality:
          type: integer
          required: true
          minimum: 1
          maximum: 10
          description: "1 = layperson, 10 = expert-only"
    messaging:
      type: object
      required: true
      properties:
        tagline:
          type: string
          required: true
        value_propositions:
          type: array
          required: true
          min_items: 1
          items:
            type: string
        elevator_pitch:
          type: string
          required: true
          description: "2-3 sentence pitch"
        boilerplate:
          type: string
          required: false
          description: "Standard 'about us' paragraph"
    writing_samples:
      type: array
      required: true
      min_items: 1
      description: "Good vs bad examples with explanations"
      items:
        context:
          type: string
          required: true
          description: "Where this copy would appear"
        good:
          type: string
          required: true
        bad:
          type: string
          required: true
        why:
          type: string
          required: true
          description: "Explanation of what makes the good version better"

# --------------------------------------------------
# AUDIENCE & PERSONAS
# --------------------------------------------------
audience:
  type: object
  required: true
  description: "Target market and detailed personas"
  properties:
    primary_market:
      type: string
      required: true
      description: "Brief description of primary market"
    personas:
      type: array
      required: true
      min_items: 1
      items:
        name:
          type: string
          required: true
          description: "Persona name (e.g. 'Startup Sarah')"
        role:
          type: string
          required: true
          description: "Job title or life role"
        age_range:
          type: string
          required: false
        quote:
          type: string
          required: true
          description: "A sentence capturing their mindset"
        goals:
          type: array
          required: true
          min_items: 1
          items:
            type: string
        frustrations:
          type: array
          required: true
          min_items: 1
          items:
            type: string
        channels:
          type: array
          required: true
          min_items: 1
          items:
            type: string
          description: "Where they spend time online"
        content_preferences:
          type: string
          required: false
          description: "How they consume information"
        decision_factors:
          type: array
          required: false
          items:
            type: string

# --------------------------------------------------
# CONTENT RULES
# --------------------------------------------------
content:
  type: object
  required: false
  description: "Writing guidelines, terminology, and content type specs"
  properties:
    dos:
      type: array
      required: true
      min_items: 1
      items:
        type: string
    donts:
      type: array
      required: true
      min_items: 1
      items:
        type: string
    terminology:
      type: object
      required: false
      properties:
        preferred:
          type: array
          required: false
          items:
            term:
              type: string
              required: true
            not:
              type: string
              required: true
              description: "Terms to avoid in favor of the preferred term"
            context:
              type: string
              required: false
        industry_terms:
          type: array
          required: false
          items:
            term:
              type: string
              required: true
            definition:
              type: string
              required: true
    grammar:
      type: object
      required: false
      properties:
        oxford_comma:
          type: boolean
          required: false
        capitalization:
          type: string
          required: false
        numbers:
          type: string
          required: false
        date_format:
          type: string
          required: false
    content_types:
      type: array
      required: false
      description: "Guidance per content format"
      items:
        type:
          type: string
          required: true
          description: "Content type name (e.g. Blog post, Email, Social media)"
        length:
          type: string
          required: false
        tone_adjustment:
          type: string
          required: false
          description: "How tone shifts for this format"
        structure:
          type: string
          required: false
          description: "Recommended structure pattern"

# --------------------------------------------------
# SOCIAL MEDIA
# --------------------------------------------------
social:
  type: object
  required: false
  description: "Platform-specific guidelines and engagement rules"
  properties:
    platforms:
      type: array
      required: true
      min_items: 1
      items:
        name:
          type: string
          required: true
          description: "Platform name (LinkedIn, Instagram, X, etc.)"
        audience:
          type: string
          required: true
          description: "Who you reach on this platform"
        tone_adjustment:
          type: string
          required: true
          description: "How voice shifts for this platform"
        post_types:
          type: array
          required: true
          items:
            type: string
        frequency:
          type: string
          required: false
        hashtag_strategy:
          type: string
          required: false
        visual_format:
          type: string
          required: false
          description: "Recommended image dimensions"
    engagement:
      type: object
      required: false
      properties:
        response_time:
          type: string
          required: false
        tone_in_replies:
          type: string
          required: false
        escalation:
          type: string
          required: false
        never:
          type: array
          required: false
          items:
            type: string
          description: "Things to never do in social engagement"
