# ============================================================
# Brand Manual — Word Document Styling
# ============================================================
# Used by: compile-and-export skill (Phase 9)
# Purpose: Defines the visual styling for brand-manual.docx
#
# The compile-and-export skill reads this file and either:
#   1. Generates a pandoc reference.docx with these styles applied
#   2. Passes style parameters to pandoc via --reference-doc
#   3. Post-processes the docx using python-docx to apply branding
#
# Placeholders ({{...}}) are resolved from brand-reference.yml
# at generation time — this file is a template, not final config.
# ============================================================


# --------------------------------------------------
# PAGE SETUP
# --------------------------------------------------
page:
  size: "A4"                     # A4 (210x297mm) — change to "Letter" for US
  margins:
    top: "25mm"
    bottom: "25mm"
    left: "30mm"
    right: "25mm"
  orientation: "portrait"


# --------------------------------------------------
# COVER PAGE
# --------------------------------------------------
cover:
  layout:
    # Top section: logo centered, generous padding
    logo:
      position: "center"
      max_width: "180mm"
      max_height: "60mm"
      margin_top: "60mm"
      source: "{{assets.logo.full_light}}"

    # Middle section: brand name + tagline
    brand_name:
      font_family: "{{typography.primary.family}}"
      font_size: "36pt"
      font_weight: "Bold"
      font_color: "{{colors.primary[0].hex}}"
      alignment: "center"
      margin_top: "20mm"

    tagline:
      font_family: "{{typography.primary.family}}"
      font_size: "16pt"
      font_weight: "Regular"
      font_color: "#666666"
      alignment: "center"
      margin_top: "8mm"

    # Subtitle: "Brand Guidelines"
    subtitle:
      text: "Brand Guidelines"
      font_family: "{{typography.primary.family}}"
      font_size: "14pt"
      font_weight: "Light"
      font_color: "#999999"
      alignment: "center"
      margin_top: "15mm"
      text_transform: "uppercase"
      letter_spacing: "3pt"

    # Bottom: version date
    version:
      font_family: "{{typography.primary.family}}"
      font_size: "10pt"
      font_color: "#AAAAAA"
      alignment: "center"
      position: "bottom"
      margin_bottom: "30mm"

  # Color accent bar at the bottom of the cover page
  accent_bar:
    position: "bottom"
    height: "8mm"
    color: "{{colors.primary[0].hex}}"
    width: "100%"


# --------------------------------------------------
# HEADING STYLES
# --------------------------------------------------
headings:
  # H1 — Section titles (## in markdown)
  h1:
    font_family: "{{typography.primary.family}}"
    font_size: "28pt"
    font_weight: "Bold"
    font_color: "{{colors.primary[0].hex}}"
    line_spacing: 1.2
    space_before: "36pt"
    space_after: "12pt"
    page_break_before: true        # Each major section starts on a new page
    border_bottom:
      width: "2pt"
      color: "{{colors.primary[0].hex}}"
      padding_bottom: "6pt"

  # H2 — Subsection titles (### in markdown)
  h2:
    font_family: "{{typography.primary.family}}"
    font_size: "20pt"
    font_weight: "SemiBold"
    font_color: "#333333"
    line_spacing: 1.3
    space_before: "24pt"
    space_after: "8pt"

  # H3 — Sub-subsection titles (#### in markdown)
  h3:
    font_family: "{{typography.primary.family}}"
    font_size: "14pt"
    font_weight: "SemiBold"
    font_color: "{{colors.primary[0].hex}}"
    line_spacing: 1.3
    space_before: "18pt"
    space_after: "6pt"

  # H4 — Detail headings (##### in markdown)
  h4:
    font_family: "{{typography.primary.family}}"
    font_size: "12pt"
    font_weight: "Bold"
    font_color: "#555555"
    line_spacing: 1.4
    space_before: "12pt"
    space_after: "4pt"


# --------------------------------------------------
# BODY TEXT
# --------------------------------------------------
body:
  font_family: "{{typography.secondary.family}}"   # Falls back to primary if no secondary
  fallback_font: "{{typography.primary.family}}"
  font_size: "11pt"
  font_color: "#333333"
  line_spacing: 1.5
  space_after: "6pt"
  first_line_indent: "0mm"          # No indent — modern style


# --------------------------------------------------
# BLOCKQUOTES
# --------------------------------------------------
blockquote:
  font_family: "{{typography.primary.family}}"
  font_size: "12pt"
  font_style: "Italic"
  font_color: "#555555"
  line_spacing: 1.4
  left_border:
    width: "3pt"
    color: "{{colors.primary[0].hex}}"
  left_padding: "10mm"
  background_color: "#F8F9FA"
  padding: "8mm"


# --------------------------------------------------
# TABLES
# --------------------------------------------------
tables:
  # Header row
  header:
    font_family: "{{typography.primary.family}}"
    font_size: "10pt"
    font_weight: "Bold"
    font_color: "#FFFFFF"
    background_color: "{{colors.primary[0].hex}}"
    alignment: "left"
    padding: "4pt 8pt"

  # Body rows
  body_row:
    font_family: "{{typography.secondary.family}}"
    fallback_font: "{{typography.primary.family}}"
    font_size: "10pt"
    font_color: "#333333"
    padding: "4pt 8pt"

  # Alternating row colors for readability
  striping:
    enabled: true
    even_background: "#F8F9FA"
    odd_background: "#FFFFFF"

  # Borders
  borders:
    outer:
      width: "0.5pt"
      color: "#DDDDDD"
    inner_horizontal:
      width: "0.5pt"
      color: "#EEEEEE"
    inner_vertical:
      width: "0pt"              # No vertical borders — cleaner look
      color: "transparent"


# --------------------------------------------------
# LISTS
# --------------------------------------------------
lists:
  bullet:
    font_family: "{{typography.secondary.family}}"
    fallback_font: "{{typography.primary.family}}"
    font_size: "11pt"
    font_color: "#333333"
    bullet_color: "{{colors.primary[0].hex}}"
    indent: "8mm"
    space_between: "3pt"

  numbered:
    font_family: "{{typography.secondary.family}}"
    fallback_font: "{{typography.primary.family}}"
    font_size: "11pt"
    font_color: "#333333"
    number_color: "{{colors.primary[0].hex}}"
    indent: "8mm"
    space_between: "3pt"


# --------------------------------------------------
# CODE / MONOSPACE
# --------------------------------------------------
code:
  inline:
    font_family: "JetBrains Mono, Fira Code, Consolas, monospace"
    font_size: "10pt"
    font_color: "{{colors.primary[0].hex}}"
    background_color: "#F4F4F5"
    padding: "1pt 4pt"
    border_radius: "2pt"

  block:
    font_family: "JetBrains Mono, Fira Code, Consolas, monospace"
    font_size: "9pt"
    font_color: "#333333"
    background_color: "#F4F4F5"
    padding: "10mm"
    border:
      width: "0.5pt"
      color: "#E4E4E7"
    line_spacing: 1.4


# --------------------------------------------------
# SECTION DIVIDERS
# --------------------------------------------------
section_dividers:
  # Color accent bar between major sections
  accent_bar:
    enabled: true
    height: "4mm"
    color: "{{colors.primary[0].hex}}"
    width: "40mm"                  # Partial width — left-aligned accent
    alignment: "left"
    margin_top: "12pt"
    margin_bottom: "12pt"

  # Horizontal rule (--- in markdown)
  horizontal_rule:
    style: "single"
    width: "100%"
    color: "#E4E4E7"
    thickness: "0.5pt"
    space_before: "12pt"
    space_after: "12pt"


# --------------------------------------------------
# HEADER & FOOTER
# --------------------------------------------------
header:
  enabled: true
  first_page: false                # No header on cover page
  content:
    left: "{{meta.brand_name}}"
    right: "Brand Guidelines"
  font_family: "{{typography.primary.family}}"
  font_size: "8pt"
  font_color: "#AAAAAA"
  border_bottom:
    width: "0.5pt"
    color: "#E4E4E7"
    padding_bottom: "4pt"

footer:
  enabled: true
  first_page: false                # No footer on cover page
  content:
    left: "Confidential — {{meta.brand_name}} © {{current_year}}"
    center: ""
    right: "Page {{page_number}} of {{total_pages}}"
  font_family: "{{typography.primary.family}}"
  font_size: "8pt"
  font_color: "#AAAAAA"
  border_top:
    width: "0.5pt"
    color: "#E4E4E7"
    padding_top: "4pt"


# --------------------------------------------------
# TABLE OF CONTENTS
# --------------------------------------------------
toc:
  title: "Table of Contents"
  title_style:
    font_family: "{{typography.primary.family}}"
    font_size: "28pt"
    font_weight: "Bold"
    font_color: "{{colors.primary[0].hex}}"
  depth: 2                         # Show H1 and H2 only
  entry_style:
    font_family: "{{typography.secondary.family}}"
    fallback_font: "{{typography.primary.family}}"
    font_size: "11pt"
    font_color: "#333333"
    page_number_color: "#999999"
    dot_leader: true
    indent_per_level: "8mm"
  page_break_after: true           # TOC gets its own page


# --------------------------------------------------
# IMAGES
# --------------------------------------------------
images:
  max_width: "150mm"               # Never wider than text area
  alignment: "center"
  caption:
    font_family: "{{typography.secondary.family}}"
    fallback_font: "{{typography.primary.family}}"
    font_size: "9pt"
    font_color: "#888888"
    font_style: "Italic"
    alignment: "center"
    space_before: "4pt"


# --------------------------------------------------
# COLOR SWATCH RENDERING
# --------------------------------------------------
# The compile-and-export skill uses these rules to render
# color swatches in the docx. Since Word doesn't support
# CSS-style colored boxes natively, swatches are rendered as:
#   Option A: Small colored table cells (1 row, 1 col)
#   Option B: Inline colored rectangles via Word shapes
#   Option C: External PNG swatches generated and embedded

color_swatches:
  method: "table_cell"             # Most compatible approach
  swatch_width: "15mm"
  swatch_height: "15mm"
  border:
    width: "0.5pt"
    color: "#E4E4E7"
  label_position: "right"          # Color name + hex next to swatch


# --------------------------------------------------
# PANDOC GENERATION COMMAND
# --------------------------------------------------
# The compile-and-export skill uses this as a base command.
# It generates a reference.docx from these styles first,
# then uses it for the final conversion.

pandoc:
  command: >
    pandoc brand-manual.md
    -o brand-manual.docx
    --from markdown
    --to docx
    --toc
    --toc-depth=2
    --reference-doc=brand-manual-reference.docx
    --metadata title="{{meta.brand_name}} — Brand Guidelines"
    --metadata date="{{meta.generated_date}}"
    --metadata author="{{meta.brand_name}}"

  # If pandoc is not available, the skill falls back to:
  fallback: >
    The markdown version (brand-manual.md) is the primary deliverable.
    For professional Word formatting, install pandoc:
      macOS:  brew install pandoc
      Linux:  apt-get install pandoc
    Then re-run the compile-and-export skill.
