# Plugin Ecosystem Marketplace Registry
# Auto-generated from plugin.json files. Update when adding/versioning plugins.

registry:
  name: claude-plugin-ecosystem
  version: "1.0.0"
  description: Modular plugin ecosystem for Claude Code — task planning, brand guidelines, SEO, and more.

plugins:
  task-planner:
    version: "1.0.0"
    path: plugins/task-planner
    description: >
      Generic wave-based task planning with verification and QA.
      Foundation plugin used by all other plugins.
    commands:
      - plan-create
      - plan-execute
      - plan-status
      - plan-resume
      - plugin-create
      - plugin-build
      - plugin-migrate
      - plugin-version
      - brainstorm-start
      - brainstorm-decide
      - brainstorm-status
    skills: 14
    agents:
      - qa-agent
      - worker-agent
    dependencies: []
    tags:
      - foundation
      - planning
      - verification
      - plugin-generator

  brand-guideline:
    version: "1.0.0"
    path: plugins/brand-guideline
    description: >
      Agency-grade brand guideline generator. Produces machine-readable
      brand-reference.yml and polished brand manuals.
    commands:
      - brand-generate
      - brand-analyze
      - brand-audit
      - brand-switch
    skills: 9
    agents: []
    dependencies:
      - task-planner
    shared_skills:
      - brand-context-loader
    tags:
      - branding
      - design
      - identity

  seo-plugin:
    version: "1.0.0"
    path: plugins/seo-plugin
    description: >
      Comprehensive SEO strategy with keyword research, on-page optimization,
      technical audits, competitive analysis, and content recommendations.
    commands:
      - strategy
      - audit
      - content-brief
      - export
    skills: 8
    agents: []
    dependencies:
      - task-planner
      - brand-guideline
    shared_skills:
      - brand-context-loader
    tags:
      - seo
      - marketing
      - content

# Dependency graph:
#   task-planner (foundation)
#     └── brand-guideline
#           └── seo-plugin
